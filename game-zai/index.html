<script>
    function parseBpmf(text) {
        if (!text) return "";
        const punctuation = { "гҖӮ": "гҖӮ", "пјҒ": "пјҒ", "пјҢ": "пјҢ", "пјҹ": "пјҹ", "пјҡ": "пјҡ" };
        return text.replace(/([\u4e00-\u9fa5]+|[\u3002\uff01\uff0c\uff1f\uff1a])(?:\[([^\]]+)\])?/g, (match, char, bpmf) => {
            if (punctuation[char]) {
                return `<span class="word-wrap"><span class="char">${char}</span></span>`;
            }
            if (!bpmf) return `<span class="char">${char}</span>`;
            let tone = '', symbols = bpmf;
            if (bpmf.includes('Лҷ')) { tone = 'Лҷ'; symbols = bpmf.replace('Лҷ', ''); }
            else if (bpmf.includes('ЛҠ')) { tone = 'ЛҠ'; symbols = bpmf.replace('ЛҠ', ''); }
            else if (bpmf.includes('ЛҮ')) { tone = 'ЛҮ'; symbols = bpmf.replace('ЛҮ', ''); }
            else if (bpmf.includes('ЛӢ')) { tone = 'ЛӢ'; symbols = bpmf.replace('ЛӢ', ''); }
            let symHtml = symbols.split('').join('<br>');
            let ruby = tone === 'Лҷ' ? `<span class="tone-top">Лҷ</span>` : '';
            ruby += `<span class="bpmf-symbols">${symHtml}</span>`;
            if (['ЛҠ', 'ЛҮ', 'ЛӢ'].includes(tone)) ruby += `<span class="tone-right">${tone}</span>`;
            return `<span class="word-wrap"><span class="char">${char}</span><span class="bopomofo">${ruby}</span></span>`;
        });
    }

        { text: "еӨӘ[г„Ҡг„һЛӢ]йҷҪ[г„§г„ӨЛҠ]дёӢ[г„’г„§г„ҡЛӢ]еұұ[г„•г„ў]еҫҢ[г„Ҹг„ЎЛӢ]пјҢжҳҹ[г„’г„§г„Ҙ]жҳҹ[г„’г„§г„ҘЛҷ]е°ұ[г„җг„§г„ЎЛӢ] <span class='blank-box'></span> ж¬Ў[г„ҳЛӢ]еҮә[г„”г„Ё]зҸҫ[г„’г„§г„ўЛӢ]гҖӮ[гҖӮ]", answer: "еҶҚ" },
        { text: "зқЎ[г„•г„Ёг„ҹЛӢ]иҰә[г„җг„§г„ ЛӢ]еүҚ[г„‘г„§г„ўЛҠ]иҰҒ[г„§г„ ЛӢ]е…Ҳ[г„’г„§г„ў]еҲ·[г„•г„Ёг„ҡ]зүҷ[г„§г„ҡЛҠ]пјҢ <span class='blank-box'></span> иәә[г„Ҡг„ӨЛҮ]еҲ°[г„үг„ ЛӢ]еәҠ[г„”г„Ёг„ӨЛҠ]дёҠ[г„•г„ӨЛӢ]гҖӮ[гҖӮ]", answer: "еҶҚ" },
        { text: "зӯү[г„үг„ҘЛҮ]йӣЁ[г„©ЛҮ]еҒң[г„Ҡг„§г„ҘЛҠ]дәҶ[г„Ңг„ңЛҷ]пјҢжҲ‘[г„Ёг„ӣЛҮ]еҖ‘[г„Үг„ЈЛҷ] <span class='blank-box'></span> еҺ»[г„‘г„©ЛӢ]ж“Қ[г„ҳг„ ]е ҙ[г„”г„ӨЛҮ]и·‘[г„Ҷг„ ЛҮ]жӯҘ[г„…г„ЁЛӢ]гҖӮ[гҖӮ]", answer: "еҶҚ" },
        { text: "йҖҷ[г„“г„ңЛӢ]жң¬[г„…г„ЈЛҮ]з№Ә[г„Ҹг„Ёг„ҹЛӢ]жң¬[г„…г„ЈЛҮ]еҫҲ[г„Ҹг„ЈЛҮ]жңү[г„§г„ЎЛҮ]и¶Ј[г„‘г„©ЛӢ]пјҢжҲ‘[г„Ёг„ӣЛҮ]йӮ„[г„Ҹг„һЛҠ]жғі[г„’г„§г„ӨЛҮ] <span class='blank-box'></span> зңӢ[г„Һг„ўЛӢ]гҖӮ[гҖӮ]", answer: "еҶҚ" },
        { text: "е…Ҳ[г„’г„§г„ў]з©ҝ[г„”г„Ёг„ў]еҘҪ[г„Ҹг„ ЛҮ]иҘӘ[г„Ёг„ҡЛӢ]еӯҗ[г„—Лҷ]пјҢ <span class='blank-box'></span> з©ҝ[г„”г„Ёг„ў]дёҠ[г„•г„ӨЛӢ]йҒӢ[г„©г„ЈЛӢ]йҒӢеӢ•[г„үг„Ёг„ҘЛӢ]йһӢ[г„’г„§г„қЛҠ]гҖӮ[гҖӮ]", answer: "еҶҚ" },
        { text: "еҰӮ[г„–г„ЁЛҠ]жһң[г„Қг„Ёг„ӣЛҮ]иӮҡ[г„үг„ЁЛӢ]еӯҗ[г„—Лҷ]йӨ“[г„ңЛӢ]пјҢеҸҜ[г„Һг„ңЛҮ]д»Ҙ[г„§ЛҮ] <span class='blank-box'></span> еҗғ[г„”]дёҖ[г„§]еЎҠ[г„Һг„Ёг„һЛӢ]йӨ…[г„…г„§г„ҘЛҮ]д№ҫ[г„Қг„ў]гҖӮ[гҖӮ]", answer: "еҶҚ" },
        { text: " <span class='blank-box'></span> йҒҺ[г„Қг„Ёг„ӣЛӢ]дә”[г„ЁЛҮ]еҲҶ[г„Ҳг„Ј]йҗҳ[г„“г„Ёг„Ҙ]пјҢйӣ»[г„үг„§г„ўЛӢ]иҰ–[г„•ЛӢ]зҜҖ[г„җг„§г„қЛҠ]зӣ®[г„Үг„ЁЛӢ]е°ұ[г„җг„§г„ЎЛӢ]иҰҒ[г„§г„ ЛӢ]й–Ӣ[г„Һг„һ]е§Ӣ[г„•ЛҮ]гҖӮ[гҖӮ]", answer: "еҶҚ" },
        { text: "иҖҒ[г„Ңг„ ЛҮ]её«[г„•]и«Ӣ[г„‘г„§г„ҘЛҮ]еӨ§[г„үг„ҡЛӢ]е®¶[г„җг„§г„ҡ]жҠҠ[г„…г„ҡЛҮ]йҖҷ[г„“г„ңЛӢ]иЎҢ[г„Ҹг„ӨЛҠ]еӯ—[г„—ЛӢ] <span class='blank-box'></span> еҜ«[г„’г„§г„қЛҮ]дёҖ[г„§]йҒҚ[г„…г„§г„ўЛӢ]гҖӮ[гҖӮ]", answer: "еҶҚ" },
        { text: "жҲ‘[г„Ёг„ӣЛҮ]жұә[г„җг„©г„қЛҠ]е®ҡ[г„үг„§г„ҘЛӢ]й•·[г„“г„ӨЛҮ]еӨ§[г„үг„ҡЛӢ]д»Ҙ[г„§ЛҮ]еҫҢ[г„Ҹг„ЎЛӢ]пјҢ <span class='blank-box'></span> еӣһ[г„Ҹг„Ёг„ҹЛҠ]дҫҶ[г„Ңг„һЛҠ]еӯё[г„’г„©г„қЛҠ]ж Ў[г„’г„§г„ ЛӢ]зңӢ[г„Һг„ўЛӢ]гҖӮ[гҖӮ]", answer: "еҶҚ" },
        { text: "дј‘[г„’г„§г„Ў]жҒҜ[г„’г„§ЛҠ]дёҖ[г„§]дёӢ[г„’г„§г„ҡЛӢ]пјҢжҲ‘[г„Ёг„ӣЛҮ]еҖ‘[г„Үг„ЈЛҷ] <span class='blank-box'></span> з№ј[г„җг„§ЛӢ]зәҢ[г„’г„©ЛӢ]зҲ¬[г„Ҷг„ҡЛҠ]еұұ[г„•г„ў]еҗ§[г„…г„ҡЛҷ]пјҒ[пјҒ]", answer: "еҶҚ" }
    ];

    let currentQ = [], idx = 0, pName = "";

    function init() {
        document.getElementById('title-login').innerHTML = parseBpmf("еңЁ[г„—г„һЛӢ]еӨ§[г„үг„ҡЛӢ]е§Ҡ[г„җг„§г„қЛҮ]иҲҮ[г„©ЛҮ]еҶҚ[г„—г„һЛӢ]е°Ҹ[г„’г„§ЛҮ]еҰ№[г„Үг„ҹЛӢ]");
        document.getElementById('btn-start').innerHTML = parseBpmf("й–Ӣ[г„Һг„һ]е§Ӣ[г„•ЛҮ]жҢ‘[г„Ҡг„§г„ ЛҮ]жҲ°[г„“г„ўЛӢ]");
        document.getElementById('history-title').innerHTML = parseBpmf("йҒҺ[г„Қг„Ёг„ӣЛӢ]еҺ»[г„‘г„©ЛӢ]зҡ„[г„үг„ңЛҷ]зҙҖ[г„җг„§ЛӢ]йҢ„[г„Ңг„ЁЛӢ]пјҡ");
        document.getElementById('btn-prev').innerHTML = parseBpmf("дёҠ[г„•г„ӨЛӢ]дёҖ[г„§]йЎҢ[г„Ҡг„§ЛҠ]");
        document.getElementById('btn-next').innerHTML = parseBpmf("дёӢ[г„’г„§г„ҡЛӢ]дёҖ[г„§]йЎҢ[г„Ҡг„§ЛҠ]");
        document.getElementById('btn-home').innerHTML = parseBpmf("еӣһ[г„Ҹг„Ёг„ҹЛҠ]йҰ–[г„•г„ЎЛҮ]й Ғ[г„§г„қЛӢ]");
        document.getElementById('result-title').innerHTML = parseBpmf("жҢ‘[г„Ҡг„§г„ ЛҮ]жҲ°[г„“г„ўЛӢ]зөҗ[г„җг„§г„қЛҠ]жқҹ[г„•г„ЁЛӢ]");
        updateHistory();
    }

    function startGame() {
        pName = document.getElementById('player-name').value.trim() || "е°ҸиӢұйӣ„";
        currentQ = [...qBank].sort(() => Math.random() - 0.5).map(q => ({...q, user: null}));
        idx = 0;
        switchScreen('game-screen');
        showQ();
    }

    function showQ() {
        const data = currentQ[idx];
        document.getElementById('progress').innerText = `йҖІеәҰпјҡ${idx + 1} / 30`;
        document.getElementById('question-text').innerHTML = parseBpmf(data.text);
        
        const b1 = document.getElementById('btn-zai1');
        const b2 = document.getElementById('btn-zai2');
        b1.className = 'btn btn-choice btn-zai1';
        b2.className = 'btn btn-choice btn-zai2';
        b1.innerHTML = 'еңЁ<div class="feedback-icon"></div>';
        b2.innerHTML = 'еҶҚ<div class="feedback-icon"></div>';
        b1.disabled = b2.disabled = false;

        if(data.user) {
            b1.disabled = b2.disabled = true;
            if(data.answer === 'еңЁ') {
                b1.classList.add('btn-correct'); b1.querySelector('.feedback-icon').innerText = 'вң”пёҸ';
                if(data.user === 'еҶҚ') { b2.classList.add('btn-wrong'); b2.querySelector('.feedback-icon').innerText = 'вң–пёҸ'; }
            } else {
                b2.classList.add('btn-correct'); b2.querySelector('.feedback-icon').innerText = 'вң”пёҸ';
                if(data.user === 'еңЁ') { b1.classList.add('btn-wrong'); b1.querySelector('.feedback-icon').innerText = 'вң–пёҸ'; }
            }
        }
        document.getElementById('btn-prev').style.visibility = idx === 0 ? 'hidden' : 'visible';
        document.getElementById('btn-next').style.visibility = idx === 29 ? 'hidden' : 'visible';
        document.getElementById('btn-finish').style.display = currentQ.every(q => q.user) ? 'inline-block' : 'none';
    }

    function submitAnswer(ans) {
        currentQ[idx].user = ans;
        showQ();
        if(idx < 29) setTimeout(goNext, 800);
    }

    function goNext() { if(idx < 29) { idx++; showQ(); } }
    function goPrev() { if(idx > 0) { idx--; showQ(); } }

    function endGame() {
        let score = currentQ.filter(q => q.user === q.answer).length;
        const final = Math.round((score / 30) * 100);
        switchScreen('result-screen');
        document.getElementById('score-display').innerText = `${pName}пјҡ${final} еҲҶ`;
        saveScore(pName, final);
        updateHistory(); // дҝ®ж”№иҷ•пјҡдәӨеҚ·еҫҢз«ӢеҚіжӣҙж–°йЎҜзӨәзҙҖйҢ„
    }

    function saveScore(n, s) {
        let h = JSON.parse(localStorage.getItem('zai_history')) || [];
        h.unshift({n, s, t: new Date().toLocaleDateString()});
        localStorage.setItem('zai_history', JSON.stringify(h.slice(0, 5)));
    }

    function updateHistory() {
        const list = document.getElementById('history-list');
        let h = JSON.parse(localStorage.getItem('zai_history')) || [];
        list.innerHTML = h.map(i => `<li>${i.n}: ${i.s}еҲҶ</li>`).join('');
    }

    function switchScreen(id) {
        ['login-screen', 'game-screen', 'result-screen'].forEach(s => document.getElementById(s).style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    window.onload = init;
</script>
</body>
</html>
