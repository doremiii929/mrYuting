<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科幻乘法大探測 - 2.4.5.8 專場</title>
    <style>
        @font-face {
            font-family: 'DFKai-SB';
            src: local('DFKai-SB'), local('BiauKai'), local('標楷體');
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'DFKai-SB', '標楷體', serif;
            background-color: #000510;
            background-image: 
                radial-gradient(circle at 50% 50%, #001a33 0%, #000510 100%),
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            overflow: hidden;
        }

        #game-container {
            width: 90%;
            max-width: 850px;
            background: rgba(0, 20, 40, 0.9);
            border: 4px solid #00d2ff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.4);
            position: relative;
            text-align: center;
            z-index: 10;
        }

        /* ---------------- 注音排版邏輯 ---------------- */
        .word-wrap {
            display: inline-flex;
            align-items: center;
            margin: 0 4px;
            vertical-align: middle;
            white-space: nowrap;
        }
        .char { font-weight: bold; }
        .bopomofo {
            position: relative;
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.42em;
            line-height: 1.1;
            margin-left: 4px;
            padding-right: 12px;
            color: #00d2ff;
        }
        .tone-right {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1em;
        }

        /* 標題與小標題 */
        .header-section { margin-bottom: 30px; }
        .title-sci-fi {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        .title-sci-fi .char { font-size: 64px; text-shadow: 0 0 15px #00d2ff; }
        .subtitle {
            font-size: 28px;
            color: #ff0055;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #ff0055;
            margin-bottom: 20px;
        }

        /* ---------------- 介面切換 ---------------- */
        #login-screen, #game-screen, #result-screen { display: none; }
        .active { display: block !important; }

        input[type="text"] {
            background: #001a33;
            color: #fff;
            border: 2px solid #00d2ff;
            padding: 15px;
            font-size: 24px;
            border-radius: 10px;
            text-align: center;
            width: 60%;
            margin-bottom: 30px;
            font-family: 'DFKai-SB';
        }

        .btn-sci-fi {
            background: transparent;
            color: #fff;
            border: 2px solid #ff0055;
            padding: 15px 50px;
            font-size: 28px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'DFKai-SB';
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
            transition: 0.3s;
        }
        .btn-sci-fi:hover { background: #ff0055; box-shadow: 0 0 25px #ff0055; }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 210, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #00d2ff;
            font-size: 26px;
        }
        .num-highlight { color: #ff0055; font-weight: bold; margin-left: 5px; }

        #question-display {
            font-size: 140px;
            margin: 40px 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .options-container {
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        .option-btn {
            width: 190px;
            padding: 25px 0;
            font-size: 65px;
            background: #001a33;
            color: #00d2ff;
            border: 3px solid #00d2ff;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'DFKai-SB';
        }
        .btn-correct { background: #00ff88 !important; color: #000 !important; border-color: #00ff88 !important; box-shadow: 0 0 30px #00ff88; }
        .btn-wrong { background: #ff0055 !important; color: #fff !important; border-color: #ff0055 !important; animation: shake 0.3s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .result-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            margin: 20px 0;
            text-align: left;
            display: inline-block;
            border: 1px solid #00d2ff;
        }
        .score-line { font-size: 34px; line-height: 2.2; }
    </style>
</head>
<body>

<div id="player-wrapper" style="position: absolute; top: -10px; left: -10px; width: 1px; height: 1px; overflow: hidden; opacity: 0.01;">
    <div id="player"></div>
</div>

<div id="game-container">
    <div id="login-screen" class="active">
        <div class="header-section">
            <div id="login-title" class="title-sci-fi"></div>
            <div class="subtitle">2 . 4 . 5 . 8 乘法專場</div>
        </div>
        <input type="text" id="player-name" placeholder="輸入時空探險家姓名" maxlength="8">
        <br>
        <button class="btn-sci-fi" onclick="startGame()" id="btn-start"></button>
    </div>

    <div id="game-screen">
        <div class="stats-bar">
            <div id="stat-timer"></div>
            <div id="stat-correct"></div>
            <div id="stat-wrong"></div>
        </div>
        <div id="question-display"></div>
        <div class="options-container">
            <button class="option-btn" onclick="checkAnswer(0)"></button>
            <button class="option-btn" onclick="checkAnswer(1)"></button>
            <button class="option-btn" onclick="checkAnswer(2)"></button>
        </div>
    </div>

    <div id="result-screen">
        <div id="end-title" class="title-sci-fi"></div>
        <div class="result-box">
            <div class="score-line" id="res-name"></div>
            <div class="score-line" id="res-correct"></div>
            <div class="score-line" id="res-wrong"></div>
            <div class="score-line" id="res-rate"></div>
        </div>
        <br><br>
        <button class="btn-sci-fi" onclick="location.reload()" id="btn-restart"></button>
    </div>
</div>

<script>
    // --- 音效處理 ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSuccessSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function playErrorSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(110, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(55, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    // --- YouTube API 修正 ---
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var ytPlayer;
    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            height: '200', // 設定一個實體高度
            width: '200',
            videoId: '5-FPU8-fE_s',
            playerVars: { 
                'autoplay': 0, 
                'loop': 1, 
                'playlist': '5-FPU8-fE_s',
                'controls': 0,
                'showinfo': 0,
                'modestbranding': 1
            }
        });
    }

    // --- 注音排版 ---
    function parseBpmf(text) {
        return text.replace(/([^\u0000-\u007F]+)(?:\[([^\]]+)\])/g, (match, char, bpmf) => {
            let tone = '';
            let mainSymbols = bpmf;
            if (['ˊ','ˇ','ˋ'].some(t => bpmf.includes(t))) {
                tone = bpmf.slice(-1);
                mainSymbols = bpmf.slice(0, -1);
            }
            let symHtml = mainSymbols.split('').join('<br>');
            let toneHtml = tone ? `<span class="tone-right">${tone}</span>` : '';
            return `<span class="word-wrap"><span class="char">${char}</span><span class="bopomofo">${symHtml}${toneHtml}</span></span>`;
        });
    }

    let timeLeft = 60, correctTotal = 0, wrongTotal = 0, currentAnswer = 0, timerId, pName = "";
    const targetNumbers = [2, 4, 5, 8];

    function init() {
        document.getElementById('login-title').innerHTML = parseBpmf("乘[ㄔㄥˊ]法[ㄈㄚˇ]大[ㄉㄚˋ]探[ㄊㄢˋ]測[ㄘㄜˋ]");
        document.getElementById('btn-start').innerHTML = parseBpmf("啟[ㄑㄧˇ]動[ㄉㄨㄥˋ]引[ㄧㄣˇ]擎[ㄑㄧㄥˊ]");
        document.getElementById('stat-timer').innerHTML = parseBpmf("時[ㄕˊ]間[ㄐㄧㄢ]：") + '<span id="timer" class="num-highlight">60</span>';
        document.getElementById('stat-correct').innerHTML = parseBpmf("成[ㄔㄥˊ]功[ㄍㄨㄥ]：") + '<span id="correct-count" class="num-highlight">0</span>';
        document.getElementById('stat-wrong').innerHTML = parseBpmf("失[ㄕ]誤[ㄨˋ]：") + '<span id="wrong-count" class="num-highlight">0</span>';
    }

    function startGame() {
        // 確保 Web Audio 啟動
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        // 強制嘗試啟動 YouTube 音樂
        if (ytPlayer && typeof ytPlayer.playVideo === 'function') {
            ytPlayer.unMute();
            ytPlayer.setVolume(70);
            ytPlayer.playVideo();
        }

        pName = document.getElementById('player-name').value.trim() || "時空探險家";
        document.getElementById('login-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        nextQuestion();
        timerId = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }, 1000);
    }

    function nextQuestion() {
        const n1 = targetNumbers[Math.floor(Math.random() * targetNumbers.length)];
        const n2 = Math.floor(Math.random() * 9) + 1;
        currentAnswer = n1 * n2;
        document.getElementById('question-display').innerText = `${n1} × ${n2}`;
        let opts = [currentAnswer];
        while(opts.length < 3) {
            let w = (targetNumbers[Math.floor(Math.random() * targetNumbers.length)]) * (Math.floor(Math.random() * 9) + 1);
            if(!opts.includes(w)) opts.push(w);
        }
        opts.sort(() => Math.random() - 0.5);
        document.querySelectorAll('.option-btn').forEach((b, i) => {
            b.innerText = opts[i];
            b.className = 'option-btn';
        });
    }

    function checkAnswer(idx) {
        const btns = document.querySelectorAll('.option-btn');
        const val = parseInt(btns[idx].innerText);
        if(val === currentAnswer) {
            playSuccessSound();
            correctTotal++;
            document.getElementById('correct-count').innerText = correctTotal;
            btns[idx].classList.add('btn-correct');
            setTimeout(nextQuestion, 300);
        } else {
            playErrorSound();
            wrongTotal++;
            document.getElementById('wrong-count').innerText = wrongTotal;
            btns[idx].classList.add('btn-wrong');
            setTimeout(() => btns[idx].classList.remove('btn-wrong'), 800);
        }
    }

    function endGame() {
        clearInterval(timerId);
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        let totalAttempts = correctTotal + wrongTotal;
        let rate = (totalAttempts > 0) ? Math.round((correctTotal / totalAttempts) * 100) : 0;
        
        document.getElementById('end-title').innerHTML = parseBpmf("探[ㄊㄢˋ]測[ㄘㄜˋ]完[ㄨㄢˊ]成[ㄔㄥˊ]");
        const explorerBpmf = parseBpmf("探[ㄊㄢˋ]險[ㄒㄧㄢˇ]家[ㄐㄧㄚ]");
        document.getElementById('res-name').innerHTML = `<span style="color:#00d2ff">${pName}</span> ${explorerBpmf}：`;
        document.getElementById('res-correct').innerHTML = parseBpmf("成[ㄔㄥˊ]功[ㄍㄨㄥ]次[ㄘˋ]數[ㄕㄨˋ]：") + `<span class="num-highlight">${correctTotal}</span>`;
        document.getElementById('res-wrong').innerHTML = parseBpmf("失[ㄕ]誤[ㄨˋ]次[ㄘˋ]數[ㄕㄨˋ]：") + `<span class="num-highlight">${wrongTotal}</span>`;
        document.getElementById('res-rate').innerHTML = parseBpmf("精[ㄐㄧㄥ]準[ㄓㄨㄣˇ]度[ㄉㄨˋ]：") + `<span class="num-highlight">${rate}%</span>`;
        document.getElementById('btn-restart').innerHTML = parseBpmf("再[ㄗㄞˋ]次[ㄘˋ]傳[ㄔㄨㄢˊ]送[ㄙㄨㄥˋ]");
    }

    window.onload = init;
</script>
</body>
</html>
