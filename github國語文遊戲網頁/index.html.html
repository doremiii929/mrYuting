<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小語文遊戲室</title>
    <style>
        @font-face {
            font-family: 'DFKai-SB';
            src: local('DFKai-SB'), local('BiauKai'), local('標楷體');
        }
        body {
            margin: 0;
            background: #f0f7f4;
            font-family: 'DFKai-SB', '標楷體', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            background: #88ab75;
            color: white;
            width: 100%;
            padding: 30px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 50px 20px;
            max-width: 1000px;
        }
        .game-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            width: 280px;
            text-align: center;
            padding: 20px;
            transition: transform 0.3s;
            cursor: pointer;
            border: 3px solid transparent;
            text-decoration: none;
            color: inherit;
        }
        .game-card:hover {
            transform: translateY(-10px);
            border-color: #88ab75;
        }
        .game-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        .game-title {
            font-size: 24px;
            color: #333;
            font-weight: bold;
        }
        .game-desc {
            font-size: 16px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>我的語文小教室</h1>
    <p>點選遊戲，開始挑戰吧！</p>
</header>

<div class="container">
    <a href="game-de/index.html" class="game-card">
        <div class="game-icon">🧱</div>
        <div class="game-title">的與得[ㄉㄜ˙/ㄉㄜˊ]</div>
        <div class="game-desc">大哥與小弟的冒險挑戰</div>
    </a>

    <a href="game-zai/index.html" class="game-card">
        <div class="game-icon">🌟</div>
        <div class="game-title">在與再[ㄗㄞˋ]</div>
        <div class="game-desc">大姊與小妹的魔法練習</div>
    </a>

    </div>

</body>
</html>
