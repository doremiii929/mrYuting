<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玉珽老師的語文遊戲室</title>
    <style>
        @font-face {
            font-family: 'DFKai-SB';
            src: local('DFKai-SB'), local('BiauKai'), local('標楷體');
        }
        body {
            margin: 0;
            /* 這裡會抓取老師上傳的 bg.jpg */
            background: url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'DFKai-SB', '標楷體', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            background: rgba(136, 171, 117, 0.9);
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 50px 20px;
            max-width: 1000px;
        }
        .game-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            width: 250px;
            text-align: center;
            padding: 25px;
            transition: all 0.3s;
            cursor: pointer;
            border: 4px solid #fff;
            text-decoration: none;
            color: #333;
        }
        .game-card:hover {
            transform: translateY(-10px);
            border-color: #88ab75;
            background: white;
        }
        .game-icon { font-size: 50px; margin-bottom: 10px; }
        .game-title { font-size: 26px; font-weight: bold; margin-bottom: 5px; }
        .game-desc { font-size: 18px; color: #555; }
    </style>
</head>
<body>

<header>
    <h1>玉珽老師的語文遊戲室</h1>
    <p>選一個想練習的遊戲吧！</p>
</header>

<div class="container">
    <a href="game-de/" class="game-card">
        <div class="game-icon">🍎</div>
        <div class="game-title">的與得</div>
        <div class="game-desc">大哥與小弟</div>
    </a>

    <a href="game-zai/" class="game-card">
        <div class="game-icon">🍄</div>
        <div class="game-title">在與再</div>
        <div class="game-desc">大姊與小妹</div>
    </a>
</div>

</body>
</html>
