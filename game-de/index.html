<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>的大哥、得小弟</title>
    <style>
        /* 活潑可愛的背景配色 */
        body {
            margin: 0;
            padding: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #e0f7fa 0%, #c8e6c9 50%, #fff9c4 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        #game-container {
            width: 95%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
            border: 6px solid #fff;
            position: relative;
        }

        /* 放大遊戲標題 */
        h1 {
            color: #ff7043;
            margin-top: 0;
            font-size: 48px; 
            text-shadow: 3px 3px 0px #ffe0b2;
            letter-spacing: 2px;
        }

        h2 { font-size: 32px; color: #ff7043; }

        /* --- 標準直式注音樣式 --- */
        .word-wrap {
            display: inline-flex;
            align-items: center;
            margin: 0 4px;
            vertical-align: bottom;
            padding-right: 0.3em; /* 預留右側聲符的空間 */
        }
        .char {
            font-size: 1em;
            font-weight: bold;
        }
        .bopomofo {
            position: relative; /* 為了定位聲符 */
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.35em; /* 注音比例縮小 */
            line-height: 1.1;
            margin-left: 2px;
            color: #555;
            font-weight: normal;
        }
        .bpmf-symbols {
            text-align: center;
        }
        /* 輕聲在最上面 */
        .tone-top {
            text-align: center;
            margin-bottom: -2px;
            font-weight: bold;
        }
        /* 其他聲符在正右邊 */
        .tone-right {
            position: absolute;
            right: -1em; /* 放在注音符號右邊 */
            top: 50%;
            transform: translateY(-50%);
            font-weight: bold;
        }

        /* 隱藏區塊 */
        #login-screen, #game-screen, #result-screen { display: none; }
        #login-screen.active, #game-screen.active, #result-screen.active { display: block; }

        input[type="text"] {
            width: 80%;
            padding: 15px;
            font-size: 24px;
            border: 4px solid #b2dfdb;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            font-weight: bold;
        }
        input[type="text"]:focus { border-color: #4db6ac; }

        /* 按鈕樣式 */
        .btn {
            background-color: #ffb74d;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 26px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 6px 0 #f57c00;
            transition: all 0.1s;
            margin: 10px;
        }
        .btn:active { transform: translateY(6px); box-shadow: none; }
        .btn:disabled { cursor: not-allowed; opacity: 0.9; transform: none; box-shadow: 0 6px 0 rgba(0,0,0,0.2); }

        /* 遊戲選項按鈕 */
        .btn-choice {
            width: 45%;
            font-size: 50px;
            padding: 30px 10px;
            border-radius: 25px;
            position: relative;
        }
        .btn-de1 { background-color: #64b5f6; box-shadow: 0 8px 0 #1e88e5; }
        .btn-de2 { background-color: #ffca28; box-shadow: 0 8px 0 #ff8f00; color: #333;}

        /* 對錯回饋狀態 */
        .btn-correct {
            background-color: #4CAF50 !important;
            box-shadow: 0 8px 0 #2E7D32 !important;
            color: white !important;
        }
        .btn-wrong {
            background-color: #F44336 !important;
            box-shadow: 0 8px 0 #C62828 !important;
            color: white !important;
        }

        .feedback-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255,255,255,0.8);
            pointer-events: none;
            display: none;
            z-index: 10;
        }
        .btn-correct .feedback-icon { display: block; color: #ccff90; }
        .btn-wrong .feedback-icon { display: block; color: #ff8a80; }

        /* 題目與排版 */
        #question-text {
            font-size: 42px;
            color: #37474f;
            margin: 40px 0;
            line-height: 2;
        }
        .blank-box {
            display: inline-block;
            width: 60px;
            height: 60px;
            border: 5px dashed #ff7043;
            border-radius: 15px;
            vertical-align: middle;
            margin: 0 10px;
            background: rgba(255,255,255,0.5);
        }

        #progress { font-size: 22px; color: #78909c; margin-bottom: 10px; font-weight: bold; }
        #score-display { font-size: 30px; color: #e91e63; margin: 20px 0; font-weight: bold;}

        /* 下方導覽列 */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            border-top: 3px dashed #cfd8dc;
            padding-top: 20px;
        }
        .btn-nav {
            background-color: #90a4ae;
            box-shadow: 0 5px 0 #607d8b;
            font-size: 20px;
            padding: 10px 20px;
        }

        .history-box {
            background: #f1f8e9;
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 18px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            border: 2px solid #c5e1a5;
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <div id="login-screen" class="active">
        <h1 id="title-login"></h1>
        <div>
            <input type="text" id="player-name" placeholder="請輸入你的名字" maxlength="10">
        </div>
        <button class="btn" onclick="startGame()" id="btn-start"></button>
        
        <div class="history-box" id="history-box">
            <strong id="history-title"></strong>
            <ul id="history-list" style="margin: 5px 0; padding-left: 20px;"></ul>
        </div>
    </div>

    <div id="game-screen">
        <div id="progress"></div>
        <div id="question-text"></div>
        
        <div style="display: flex; justify-content: space-around; gap: 15px;">
            <button class="btn btn-choice btn-de1" onclick="submitAnswer('的')" id="btn-de1"></button>
            <button class="btn btn-choice btn-de2" onclick="submitAnswer('得')" id="btn-de2"></button>
        </div>

        <div class="nav-bar">
            <button class="btn btn-nav" onclick="goPrev()" id="btn-prev"></button>
            <button class="btn btn-nav" onclick="endGameEarly()" id="btn-finish" style="display:none; background:#ff4081; box-shadow:0 5px 0 #c2185b;">交[ㄐㄧㄠ]卷[ㄐㄩㄢˋ]</button>
            <button class="btn btn-nav" onclick="goNext()" id="btn-next"></button>
        </div>
    </div>

    <div id="result-screen">
        <h2 id="result-title"></h2>
        <div id="score-display"></div>
        <button class="btn" onclick="restartGame()" id="btn-restart"></button>
    </div>

</div>

<script>
    // --- 音效系統 (保留泡泡音效) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    
    function playBubbleSound() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    // --- 標準直式注音解析器 ---
    function parseRightBopomofo(text) {
        return text.replace(/([\u4e00-\u9fa5A-Za-z0-9]+)\[([^\]]+)\]/g, (match, char, bpmf) => {
            let tone = '';
            let symbols = bpmf;
            
            // 抓取聲符
            if (bpmf.includes('˙')) { tone = '˙'; symbols = bpmf.replace('˙', ''); }
            else if (bpmf.includes('ˊ')) { tone = 'ˊ'; symbols = bpmf.replace('ˊ', ''); }
            else if (bpmf.includes('ˇ')) { tone = 'ˇ'; symbols = bpmf.replace('ˇ', ''); }
            else if (bpmf.includes('ˋ')) { tone = 'ˋ'; symbols = bpmf.replace('ˋ', ''); }
            
            // 將注音符號拆成直式
            let symHtml = symbols.split('').join('<br>');
            
            let rubyInner = '';
            // 輕聲放最上方
            if (tone === '˙') {
                rubyInner += `<span class="tone-top">${tone}</span>`;
            }
            rubyInner += `<span class="bpmf-symbols">${symHtml}</span>`;
            // 其他聲符放右方
            if (['ˊ', 'ˇ', 'ˋ'].includes(tone)) {
                rubyInner += `<span class="tone-right">${tone}</span>`;
            }
            
            return `<span class="word-wrap"><span class="char">${char}</span><span class="bopomofo">${rubyInner}</span></span>`;
        });
    }

    // 初始化介面注音
    document.getElementById('title-login').innerHTML = parseRightBopomofo("的[ㄉㄜ˙]大[ㄉㄚˋ]哥[ㄍㄜ]、得[ㄉㄜˊ]小[ㄒㄧㄠˇ]弟[ㄉㄧˋ]");
    document.getElementById('btn-start').innerHTML = parseRightBopomofo("開[ㄎㄞ]始[ㄕˇ]遊[ㄧㄡˊ]戲[ㄒㄧˋ]");
    document.getElementById('result-title').innerHTML = parseRightBopomofo("遊[ㄧㄡˊ]戲[ㄒㄧˋ]結[ㄐㄧㄝˊ]束[ㄕㄨˋ]");
    document.getElementById('btn-restart').innerHTML = parseRightBopomofo("重[ㄔㄨㄥˊ]新[ㄒㄧㄣ]開[ㄎㄞ]始[ㄕˇ]");
    document.getElementById('history-title').innerHTML = parseRightBopomofo("過[ㄍㄨㄛˋ]去[ㄑㄩˋ]的[ㄉㄜ˙]成[ㄔㄥˊ]績[ㄐㄧ]：");
    document.getElementById('btn-prev').innerHTML = parseRightBopomofo("⬅️ 上[ㄕㄤˋ]一[ㄧ]題[ㄊㄧˊ]");
    document.getElementById('btn-next').innerHTML = parseRightBopomofo("下[ㄒㄧㄚˋ]一[ㄧ]題[ㄊㄧˊ] ➡️");
    document.getElementById('btn-finish').innerHTML = parseRightBopomofo("交[ㄐㄧㄠ]卷[ㄐㄩㄢˋ]");

    // 25題庫資料
    const originalQuestions = [
        { text: "漂[ㄆㄧㄠˋ]亮[ㄌㄧㄤˋ] <span class='blank-box'></span> 花[ㄏㄨㄚ]朵[ㄉㄨㄛˇ]", answer: "的" },
        { text: "跑[ㄆㄠˇ] <span class='blank-box'></span> 很[ㄏㄣˇ]快[ㄎㄨㄞˋ]", answer: "得" },
        { text: "我[ㄨㄛˇ] <span class='blank-box'></span> 書[ㄕㄨ]包[ㄅㄠ]", answer: "的" },
        { text: "跳[ㄊㄧㄠˋ] <span class='blank-box'></span> 很[ㄏㄣˇ]高[ㄍㄠ]", answer: "得" },
        { text: "紅[ㄏㄨㄥˊ]紅[ㄏㄨㄥˊ] <span class='blank-box'></span> 蘋[ㄆㄧㄥˊ]果[ㄍㄨㄛˇ]", answer: "的" },
        { text: "笑[ㄒㄧㄠˋ] <span class='blank-box'></span> 很[ㄏㄣˇ]開[ㄎㄞ]心[ㄒㄧㄣ]", answer: "得" },
        { text: "可[ㄎㄜˇ]愛[ㄞˋ] <span class='blank-box'></span> 小[ㄒㄧㄠˇ]狗[ㄍㄡˇ]", answer: "的" },
        { text: "寫[ㄒㄧㄝˇ] <span class='blank-box'></span> 很[ㄏㄣˇ]漂[ㄆㄧㄠˋ]亮[ㄌㄧㄤˋ]", answer: "得" },
        { text: "藍[ㄌㄢˊ]藍[ㄌㄢˊ] <span class='blank-box'></span> 天[ㄊㄧㄢ]空[ㄎㄨㄥ]", answer: "的" },
        { text: "飛[ㄈㄟ] <span class='blank-box'></span> 很[ㄏㄣˇ]遠[ㄩㄢˇ]", answer: "得" },
        { text: "大[ㄉㄚˋ]大[ㄉㄚˋ] <span class='blank-box'></span> 眼[ㄧㄢˇ]睛[ㄐㄧㄥ]", answer: "的" },
        { text: "吃[ㄔ] <span class='blank-box'></span> 很[ㄏㄣˇ]飽[ㄅㄠˇ]", answer: "得" },
        { text: "乾[ㄍㄢ]淨[ㄐㄧㄥˋ] <span class='blank-box'></span> 衣[ㄧ]服[ㄈㄨˊ]", answer: "的" },
        { text: "玩[ㄨㄢˊ] <span class='blank-box'></span> 很[ㄏㄣˇ]高[ㄍㄠ]興[ㄒㄧㄥˋ]", answer: "得" },
        { text: "輕[ㄑㄧㄥ]輕[ㄑㄧㄥ] <span class='blank-box'></span> 微[ㄨㄟˊ]風[ㄈㄥ]", answer: "的" },
        { text: "唱[ㄔㄤˋ] <span class='blank-box'></span> 很[ㄏㄣˇ]好[ㄏㄠˇ]聽[ㄊㄧㄥ]", answer: "得" },
        { text: "綠[ㄌㄩˋ]綠[ㄌㄩˋ] <span class='blank-box'></span> 草[ㄘㄠˇ]地[ㄉㄧˋ]", answer: "的" },
        { text: "睡[ㄕㄨㄟˋ] <span class='blank-box'></span> 很[ㄏㄣˇ]香[ㄒㄧㄤ]甜[ㄊㄧㄢˊ]", answer: "得" },
        { text: "媽[ㄇㄚ]媽[ㄇㄚ˙] <span class='blank-box'></span> 鞋[ㄒㄧㄝˊ]子[ㄗ˙]", answer: "的" },
        { text: "哭[ㄎㄨ] <span class='blank-box'></span> 很[ㄏㄣˇ]傷[ㄕㄤ]心[ㄒㄧㄣ]", answer: "得" },
        { text: "長[ㄔㄤˊ]長[ㄔㄤˊ] <span class='blank-box'></span> 頭[ㄊㄡˊ]髮[ㄈㄚˇ]", answer: "的" },
        { text: "走[ㄗㄡˇ] <span class='blank-box'></span> 很[ㄏㄣˇ]慢[ㄇㄢˋ]", answer: "得" },
        { text: "圓[ㄩㄢˊ]圓[ㄩㄢˊ] <span class='blank-box'></span> 月[ㄩㄝˋ]亮[ㄌㄧㄤˋ]", answer: "的" },
        { text: "說[ㄕㄨㄛ] <span class='blank-box'></span> 很[ㄏㄣˇ]清[ㄑㄧㄥ]楚[ㄔㄨˇ]", answer: "得" },
        { text: "爸[ㄅㄚˋ]爸[ㄅㄚ˙] <span class='blank-box'></span> 汽[ㄑㄧˋ]車[ㄔㄜ]", answer: "的" }
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let playerName = "";
    let autoNextTimeout = null;

    window.onload = function() {
        const savedName = localStorage.getItem('dede_playerName');
        if (savedName) document.getElementById('player-name').value = savedName;
        updateHistoryUI();
    }

    function switchScreen(screenId) {
        document.querySelectorAll('#game-container > div').forEach(div => div.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function startGame() {
        const nameInput = document.getElementById('player-name').value.trim();
        if (!nameInput) {
            alert("請先輸入你的名字喔！");
            return;
        }
        
        playerName = nameInput;
        localStorage.setItem('dede_playerName', playerName);
        
        // 初始化題目狀態
        currentQuestions = [...originalQuestions].sort(() => Math.random() - 0.5).map(q => ({
            ...q,
            userAnswer: null
        }));
        currentIndex = 0;

        switchScreen('game-screen');
        renderQuestion();
    }

    function renderQuestion() {
        clearTimeout(autoNextTimeout);
        const qData = currentQuestions[currentIndex];
        
        document.getElementById('progress').innerHTML = parseRightBopomofo(`第[ㄉㄧˋ] ${currentIndex + 1} 題[ㄊㄧˊ] / 共[ㄍㄨㄥˋ] 25 題[ㄊㄧˊ]`);
        document.getElementById('question-text').innerHTML = parseRightBopomofo(qData.text);

        const btn1 = document.getElementById('btn-de1');
        const btn2 = document.getElementById('btn-de2');
        
        // 重新繪製按鈕內容
        btn1.innerHTML = parseRightBopomofo("的[ㄉㄜ˙]") + '<div class="feedback-icon" id="icon-de1"></div>';
        btn2.innerHTML = parseRightBopomofo("得[ㄉㄜˊ]") + '<div class="feedback-icon" id="icon-de2"></div>';
        
        const icon1 = document.getElementById('icon-de1');
        const icon2 = document.getElementById('icon-de2');

        btn1.className = 'btn btn-choice btn-de1';
        btn2.className = 'btn btn-choice btn-de2';
        btn1.disabled = false;
        btn2.disabled = false;

        if (qData.userAnswer) {
            btn1.disabled = true;
            btn2.disabled = true;
            
            if (qData.answer === '的') {
                btn1.classList.add('btn-correct');
                icon1.innerHTML = '✔️';
                if (qData.userAnswer === '得') {
                    btn2.classList.add('btn-wrong');
                    icon2.innerHTML = '❌';
                }
            } else {
                btn2.classList.add('btn-correct');
                icon2.innerHTML = '✔️';
                if (qData.userAnswer === '的') {
                    btn1.classList.add('btn-wrong');
                    icon1.innerHTML = '❌';
                }
            }
        }

        document.getElementById('btn-prev').style.visibility = (currentIndex === 0) ? 'hidden' : 'visible';
        
        const allAnswered = currentQuestions.every(q => q.userAnswer !== null);
        if (allAnswered) {
            document.getElementById('btn-finish').style.display = 'inline-block';
            document.getElementById('btn-next').style.display = (currentIndex === 24) ? 'none' : 'inline-block';
        } else {
            document.getElementById('btn-finish').style.display = 'none';
            document.getElementById('btn-next').style.display = (currentIndex === 24) ? 'none' : 'inline-block';
        }
    }

    function submitAnswer(selectedText) {
        playBubbleSound();
        const qData = currentQuestions[currentIndex];
        qData.userAnswer = selectedText;
        
        renderQuestion();

        const allAnswered = currentQuestions.every(q => q.userAnswer !== null);
        
        if (allAnswered) {
            autoNextTimeout = setTimeout(endGame, 5000);
        } else if (currentIndex < 24) {
            autoNextTimeout = setTimeout(goNext, 5000);
        }
    }

    function goNext() {
        if (currentIndex < 24) {
            currentIndex++;
            renderQuestion();
        }
    }

    function goPrev() {
        if (currentIndex > 0) {
            currentIndex--;
            renderQuestion();
        }
    }

    function endGameEarly() {
        clearTimeout(autoNextTimeout);
        endGame();
    }

    function endGame() {
        let score = 0;
        currentQuestions.forEach(q => {
            if (q.userAnswer === q.answer) score += 4;
        });

        switchScreen('result-screen');
        const finalScoreText = `${playerName} 得[ㄉㄜˊ]了[ㄌㄜ˙] ${score} 分[ㄈㄣ]！`;
        document.getElementById('score-display').innerHTML = parseRightBopomofo(finalScoreText);

        saveHistory(playerName, score);
    }

    function restartGame() {
        updateHistoryUI();
        switchScreen('login-screen');
    }

    function saveHistory(name, finalScore) {
        let history = JSON.parse(localStorage.getItem('dede_history')) || [];
        const date = new Date();
        const dateString = `${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${date.getMinutes().toString().padStart(2, '0')}`;
        
        history.unshift({ name: name, score: finalScore, time: dateString });
        if (history.length > 10) history.pop();
        localStorage.setItem('dede_history', JSON.stringify(history));
    }

    function updateHistoryUI() {
        const historyList = document.getElementById('history-list');
        let history = JSON.parse(localStorage.getItem('dede_history')) || [];
        
        historyList.innerHTML = "";
        if (history.length === 0) {
            historyList.innerHTML = "<li>還沒有遊玩紀錄喔！</li>";
        } else {
            history.forEach(record => {
                const li = document.createElement('li');
                li.innerText = `${record.time} - ${record.name} : ${record.score}分`;
                historyList.appendChild(li);
            });
        }
    }
</script>

</body>
</html>
