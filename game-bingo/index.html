<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>國字賓果</title>
    <style>
        @font-face {
            font-family: 'DFKai-SB';
            src: local('DFKai-SB'), local('BiauKai'), local('標楷體');
        }

        :root {
            --primary-green: #4f772d;
            --soft-green: #ecf3e8;
            --accent-yellow: #fff59d;
            --win-red: rgba(220, 38, 38, 0.8);
        }

        /* --- 1. 手機優化：防止點擊藍框與誤選文字 --- */
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box; /* 確保邊框不撐破容器 */
        }

        body {
            margin: 0; padding: 0;
            font-family: 'DFKai-SB', '標楷體', serif;
            background: linear-gradient(180deg, #fdfbf7 0%, #d4eacc 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 允許輸入框可以打字 */
        .cell input {
            user-select: auto;
            -webkit-user-select: auto;
        }

        /* --- 背景之花 --- */
        .flower {
            position: fixed; z-index: -1; pointer-events: none;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.1));
        }
        .f1 { top: 5%; left: 2%; width: 15vw; max-width: 180px; transform: rotate(-15deg); }
        .f2 { top: 12%; right: 3%; width: 10vw; max-width: 110px; transform: rotate(20deg); }
        .f3 { top: 45%; left: -3%; width: 8vw; max-width: 90px; }
        .f4 { bottom: 10%; right: 2%; width: 20vw; max-width: 220px; }
        .f5 { bottom: 5%; left: 5%; width: 12vw; max-width: 130px; }
        .f6 { top: 40%; right: -2%; width: 9vw; max-width: 100px; }
        
        .spinning { animation: spin 20s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        header { text-align: center; margin-top: 3vh; z-index: 10; width: 90%; }

        h1 { 
            color: var(--primary-green); 
            font-size: clamp(32px, 8vw, 72px); /* 動態縮放字體 */
            margin: 0;
            text-shadow: 2px 2px 0px white, 4px 4px 10px rgba(0,0,0,0.1);
            letter-spacing: 4px;
        }
        #timer { font-size: clamp(18px, 4vw, 32px); color: #333; font-weight: bold; margin-top: 5px; }

        /* --- 容器置中優化 --- */
        #setup-screen, #result-screen, #game-screen {
            background: rgba(255, 255, 255, 0.85);
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            margin: 20px auto;
            width: 90%; /* 平板寬度自適應 */
            max-width: 800px;
            backdrop-filter: blur(10px);
            border: 4px solid white;
            z-index: 5;
        }

        #result-screen { display: none; }
        #game-screen { display: none; }

        h3 { font-size: clamp(20px, 5vw, 36px); color: #2d471a; margin-bottom: 15px; }

        .option-group {
            display: flex; justify-content: center; gap: 10px;
            margin-bottom: 20px; flex-wrap: wrap;
        }

        .btn {
            background: var(--primary-green); color: white; border: none;
            padding: 12px 24px; font-size: clamp(16px, 3vw, 28px); border-radius: 50px;
            cursor: pointer; transition: all 0.2s; font-family: 'DFKai-SB';
            box-shadow: 0 4px 0px #2d471a;
            touch-action: manipulation;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0px #2d471a; }
        .btn.active { background: #f9a825; box-shadow: 0 4px 0px #c67100; }
        .btn.go { background: #5d4037; box-shadow: 0 4px 0px #3e2723; width: 100%; margin-top: 10px;}

        .instruction-box {
            background: rgba(255, 255, 255, 0.6); padding: 15px; border-radius: 20px;
            text-align: left; border: 2px dashed var(--primary-green); margin: 15px 0;
        }
        .instruction-box p { font-size: clamp(14px, 2.5vw, 20px); line-height: 1.5; margin: 5px 0; color: #1b5e20; font-weight: bold; }

        /* --- 賓果格子優化 --- */
        .grid-container {
            display: grid;
            gap: 8px; /* 平板間距縮小 */
            background: rgba(255,255,255,0.9);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin: 0 auto;
            width: 100%;
            max-width: 600px; /* 限制最大寬度，避免格子在平板上變太巨型 */
        }

        .cell {
            aspect-ratio: 1/1;
            background: white;
            border: 2px solid #c8e6c9;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .cell input {
            width: 100%; height: 100%; border: none; background: transparent;
            text-align: center; font-size: clamp(20px, 6vw, 45px); /* 隨螢幕縮放字體 */
            font-family: 'DFKai-SB'; color: black; font-weight: bold;
            padding: 0; margin: 0;
        }
        .cell.marked { background-color: var(--accent-yellow); border-color: #fbc02d; }
        
        /* 連線樣式優化 */
        .cell.line-h::after, .cell.line-v::after, .cell.line-d1::after, .cell.line-d2::after {
            content:''; position:absolute; background:var(--win-red); z-index:2;
        }
        .cell.line-h::after { width:100%; height:6px; top: 50%; transform: translateY(-50%); }
        .cell.line-v::after { height:100%; width:6px; left: 50%; transform: translateX(-50%); }
        .cell.line-d1::after { width:150%; height:6px; transform:rotate(45deg); }
        .cell.line-d2::after { width:150%; height:6px; transform:rotate(-45deg); }

        #bingo-btn {
            display: none; background: #e53935; font-size: clamp(24px, 6vw, 50px);
            padding: 15px 50px; animation: bounce 0.8s infinite; margin-top: 20px;
            border-radius: 50px;
        }
        @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

        #result-screen h1 { font-size: clamp(50px, 15vw, 100px); color: #ef6c00; }
    </style>
</head>
<body>

    <audio id="snd-bingo" src="powerup03.mp3"></audio>
    <audio id="snd-win" src="kids-shouting-yeah.mp3"></audio>


    <img src="flower1.png" class="flower f1" id="fl1">
    <img src="flower2.png" class="flower f2" id="fl2">
    <img src="flower3.png" class="flower f3" id="fl3">
    <img src="flower4.png" class="flower f4" id="fl4">
    <img src="flower5.png" class="flower f5" id="fl5">
    <img src="flower6.png" class="flower f6" id="fl6">

    <header>
        <h1>國字賓果！</h1>
        <div id="timer">時間：00:00</div>
    </header>

    <div id="setup-screen">
        <h3>選擇格子數</h3>
        <div class="option-group">
            <button class="btn opt-grid active" onclick="setGrid(16, this)">16格</button>
            <button class="btn opt-grid" onclick="setGrid(25, this)">25格</button>
            <button class="btn opt-grid" onclick="setGrid(36, this)">36格</button>
        </div>
        
        <h3>需要連成幾條線？</h3>
        <div class="option-group">
            <button class="btn opt-line active" onclick="setLines(1, this)">1 條線</button>
            <button class="btn opt-line" onclick="setLines(2, this)">2 條線</button>
            <button class="btn opt-line" onclick="setLines(3, this)">3 條線</button>
        </div>

        <div class="instruction-box">
            <p>(1)請教師及學生先確認是否為同個格子數與賓果連線數</p>
            <p>(2)自行在格子上打上國字</p>
            <p>(3)點擊方框內的國字後，方框即會變黃色</p>
            <p>(4)當可連線即可勝利</p>
        </div>
        <button class="btn go" onclick="initGame()">進入準備階段 ➔</button>
    </div>

    <div id="game-screen">
        <div style="text-align: center; margin-bottom: 15px;">
            <span id="mode-text" style="color: #ef6c00; font-size: clamp(16px, 3vw, 24px); font-weight: bold; background:white; padding:5px 15px; border-radius:10px;">【編輯模式】</span>
            <br><br>
            <button class="btn" id="start-play-btn" style="background:#2e7d32" onclick="startPlaying()">填好了，開始玩！</button>
        </div>
        <div id="grid" class="grid-container"></div>
        <center><button id="bingo-btn" class="btn" onclick="showWin()">賓果！</button></center>
    </div>

    <div id="result-screen">
        <h1>🏆 賓果！</h1>
        <p id="final-time" style="font-size: clamp(24px, 5vw, 40px); font-weight: bold;"></p>
        <button class="btn" style="margin-top:20px" onclick="location.reload()">再玩一次</button>
    </div>

<script>
    /* 以下邏輯完全維持不變，僅修正 CSS 排版 */
    let gridSize = 16;
    let side = 4;
    let neededLines = 1;
    let isPlaying = false;
    let seconds = 0;
    let timerInterval;

    function setGrid(num, btn) { 
        gridSize = num; 
        side = Math.sqrt(num); 
        document.querySelectorAll('.opt-grid').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function setLines(num, btn) {
        neededLines = num;
        document.querySelectorAll('.opt-line').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function initGame() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        const grid = document.getElementById('grid');
        grid.style.gridTemplateColumns = `repeat(${side}, 1fr)`;
        grid.innerHTML = '';
        for (let i = 0; i < gridSize; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerHTML = `<input type="text" maxlength="1">`;
            cell.onclick = function() { toggleMark(this); };
            grid.appendChild(cell);
        }
    }

    function startPlaying() {
        isPlaying = true;
        document.getElementById('mode-text').innerText = "【遊玩模式】";
        document.getElementById('start-play-btn').style.display = 'none';
        document.querySelectorAll('.cell input').forEach(input => { 
            input.readOnly = true; 
            input.style.cursor = 'pointer'; 
        });
        timerInterval = setInterval(() => {
            seconds++;
            let m = Math.floor(seconds/60).toString().padStart(2, '0');
            let s = (seconds%60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `時間：${m}:${s}`;
        }, 1000);
    }

    function toggleMark(cell) {
        if (!isPlaying) return;
        cell.classList.toggle('marked');
        checkBingo();
    }

    function checkBingo() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach(c => c.classList.remove('line-h', 'line-v', 'line-d1', 'line-d2'));
        let linesFound = 0;

        for (let r = 0; r < side; r++) {
            let row = [];
            for (let c = 0; c < side; c++) row.push(cells[r * side + c]);
            if (row.every(el => el.classList.contains('marked'))) { linesFound++; row.forEach(el => el.classList.add('line-h')); }
        }
        for (let c = 0; c < side; c++) {
            let col = [];
            for (let r = 0; r < side; r++) col.push(cells[r * side + c]);
            if (col.every(el => el.classList.contains('marked'))) { linesFound++; col.forEach(el => el.classList.add('line-v')); }
        }
        let d1 = [];
        for (let i = 0; i < side; i++) d1.push(cells[i * side + i]);
        if (d1.every(el => el.classList.contains('marked'))) { linesFound++; d1.forEach(el => el.classList.add('line-d1')); }
        let d2 = [];
        for (let i = 0; i < side; i++) d2.push(cells[i * side + (side - 1 - i)]);
        if (d2.every(el => el.classList.contains('marked'))) { linesFound++; d2.forEach(el => el.classList.add('line-d2')); }

        document.getElementById('bingo-btn').style.display = (linesFound >= neededLines) ? 'block' : 'none';
    }

    function showWin() {
        document.getElementById('snd-bingo').play();
        setTimeout(() => {
            clearInterval(timerInterval);
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-time').innerText = "完成" + document.getElementById('timer').innerText;
            document.getElementById('snd-win').play();
            for(let i=1; i<=6; i++) document.getElementById('fl'+i).classList.add('spinning');
        }, 500); 
    }
</script>
</body>
</html>
