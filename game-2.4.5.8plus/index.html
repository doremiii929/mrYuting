<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乘法雙人對戰 - 2.4.5.8</title>
    <style>
        @font-face {
            font-family: 'DFKai-SB';
            src: local('DFKai-SB'), local('BiauKai'), local('標楷體');
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'DFKai-SB', '標楷體', serif;
            background-color: #000510;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }

        /* ---------------- 背景與煙火 ---------------- */
        .bg-layer {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background-image: 
                radial-gradient(circle at 50% 50%, #001a33 0%, #000510 100%),
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            z-index: -1;
        }

        #fireworks-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 99;
        }

        /* ---------------- 注音排版邏輯 ---------------- */
        .word-wrap { display: inline-flex; align-items: center; margin: 0 4px; vertical-align: middle; white-space: nowrap;}
        .char { font-weight: bold; }
        .bopomofo {
            position: relative; display: inline-flex; flex-direction: column;
            justify-content: center; align-items: center; font-size: 0.42em;
            line-height: 1.1; margin-left: 4px; padding-right: 12px; color: #00d2ff;
        }
        .tone-right {
            position: absolute; right: 0; top: 50%; transform: translateY(-50%);
            font-size: 1em; font-weight: bold;
        }

        /* 標題與小標題 */
        .header-section { margin-bottom: 30px; }
        .title-sci-fi {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
            flex-wrap: nowrap;
        }
        .title-sci-fi .char { font-size: 64px; text-shadow: 0 0 15px #00d2ff; }
        .subtitle {
            font-size: 28px;
            color: #ff0055;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #ff0055;
            margin-bottom: 20px;
        }

        /* ---------------- 介面切換 ---------------- */
        #login-screen, #game-screen, #result-screen { display: none; height: 100%; }
        .active { display: flex !important; flex-direction: column; align-items: center; justify-content: center; }

        input[type="text"] {
            background: #001a33; color: #fff; border: 2px solid #00d2ff;
            padding: 15px; font-size: 24px; border-radius: 10px;
            text-align: center; width: 60%; margin-bottom: 30px; font-family: 'DFKai-SB';
        }

        .btn-sci-fi {
            background: transparent; color: #fff; border: 2px solid #ff0055; padding: 15px 50px;
            font-size: 28px; border-radius: 50px; cursor: pointer; font-family: 'DFKai-SB';
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4); transition: 0.3s;
        }
        .btn-sci-fi:hover { background: #ff0055; box-shadow: 0 0 25px #ff0055; }

        /* ---------------- 遊戲 PK 畫面 ---------------- */
        #game-screen { flex-direction: row !important; }
        .player-zone {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; position: relative;
        }
        .red-zone { border-right: 2px solid rgba(255, 255, 255, 0.2); background: rgba(255, 0, 85, 0.05); }
        .blue-zone { background: rgba(0, 210, 255, 0.05); }

        .player-label { font-size: 32px; margin-bottom: 10px; padding: 8px 25px; border-radius: 10px; font-weight: bold; }
        .red-label { background: #ff0055; box-shadow: 0 0 15px #ff0055; }
        .blue-label { background: #00d2ff; color: #000; box-shadow: 0 0 15px #00d2ff; }

        .q-display { font-size: 110px; margin: 20px 0; text-shadow: 0 0 20px rgba(255,255,255,0.4); }
        .opt-btn {
            width: 130px; height: 110px; font-size: 50px; background: #001a33;
            color: white; border: 3px solid currentColor; border-radius: 15px;
            cursor: pointer; font-family: 'DFKai-SB'; margin: 0 10px;
        }
        .btn-correct { background: #00ff88 !important; color: #000 !important; border-color: #00ff88 !important; box-shadow: 0 0 30px #00ff88; }
        .btn-wrong { background: #ff0055 !important; color: #fff !important; border-color: #ff0055 !important; animation: shake 0.3s; }

        #timer-circle {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 10px 30px; border-radius: 40px;
            font-size: 32px; font-weight: bold; z-index: 100; box-shadow: 0 0 20px #fff;
        }

        /* ---------------- 結算畫面 (簡潔化修正) ---------------- */
        .winner-text { font-size: 70px; color: #ffcc00; text-shadow: 0 0 30px #ffcc00; margin-bottom: 20px; z-index: 101; }
        .result-box-clean { 
            background: rgba(0, 20, 40, 0.95); 
            padding: 40px 60px; 
            border-radius: 30px; 
            border: 3px solid #00d2ff; 
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
            margin: 20px 0 40px; 
            text-align: left; 
            display: inline-block;
            z-index: 101;
        }
        .score-line-clean {
            font-size: 36px;
            color: #fff; /* 數據行文字皆為白色 */
            line-height: 2.2;
            display: flex;
            align-items: center;
        }
        .dot { display: inline-block; width: 24px; height: 24px; border-radius: 50%; margin-right: 15px; }
        .red-dot { background: #ff0055; box-shadow: 0 0 10px #ff0055; }
        .blue-dot { background: #00d2ff; box-shadow: 0 0 10px #00d2ff; }
        
        .score-num { color: #fff; font-weight: bold; margin: 0 10px; font-size: 1.2em; }
        
        /* 結算方框內保留國字紅藍顏色區分 */
        .team-red { color: #ff0055; font-weight: bold; }
        .team-blue { color: #00d2ff; font-weight: bold; }

        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }
    </style>
</head>
<body>

<canvas id="fireworks-canvas"></canvas>
<div class="bg-layer"></div>
<div id="player-wrapper" style="position:absolute; width:1px; height:1px; opacity:0.01; overflow:hidden;"><div id="player"></div></div>

<div id="login-screen" class="active">
    <div id="title-main" class="title-sci-fi"></div>
    <div class="subtitle">2 . 4 . 5 . 8 專 場</div>
    <div style="background: rgba(255,255,255,0.1); padding: 25px; border-radius: 20px; margin-bottom: 30px; font-size: 22px;">
        <p id="p1-hint"></p>
        <p id="p2-hint"></p>
    </div>
    <button class="btn-sci-fi" onclick="startGame()" id="btn-go"></button>
</div>

<div id="game-screen">
    <div id="timer-circle">60</div>
    <div class="player-zone red-zone">
        <div class="player-label red-label" id="lbl-red"></div>
        <div id="p1-stat-top" style="font-size:24px">成功：0 | 失誤：0</div>
        <div class="q-display" id="p1-q"></div>
        <div class="options">
            <button class="opt-btn" onclick="check(1, 0)" id="p1-b0"></button>
            <button class="opt-btn" onclick="check(1, 1)" id="p1-b1"></button>
            <button class="opt-btn" onclick="check(1, 2)" id="p1-b2"></button>
        </div>
    </div>
    <div class="player-zone blue-zone">
        <div class="player-label blue-label" id="lbl-blue"></div>
        <div id="p2-stat-top" style="font-size:24px">成功：0 | 失誤：0</div>
        <div class="q-display" id="p2-q"></div>
        <div class="options">
            <button class="opt-btn" onclick="check(2, 0)" id="p2-b0"></button>
            <button class="opt-btn" onclick="check(2, 1)" id="p2-b1"></button>
            <button class="opt-btn" onclick="check(2, 2)" id="p2-b2"></button>
        </div>
    </div>
</div>

<div id="result-screen">
    <div id="winner-banner" class="winner-text"></div>
    <div class="result-box-clean">
        <div class="score-line-clean">
            <span class="dot red-dot"></span>
            <span class="team-red">紅隊</span>：成功 <span id="res-p1-c" class="score-num"></span> 次 / 失誤 <span id="res-p1-w" class="score-num"></span> 次
        </div>
        <div class="score-line-clean">
            <span class="dot blue-dot"></span>
            <span class="team-blue">藍隊</span>：成功 <span id="res-p2-c" class="score-num"></span> 次 / 失誤 <span id="res-p2-w" class="score-num"></span> 次
        </div>
    </div>
    <button class="btn-sci-fi" onclick="location.reload()" id="btn-restart"></button>
</div>

<script>
    // --- 音效處理 ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSnd(isCorrect) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = isCorrect ? 'sine' : 'sawtooth';
        osc.frequency.setValueAtTime(isCorrect ? 600 : 110, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.8, audioCtx.currentTime); 
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    // --- 背景音樂 (Youtube API) ---
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, null);
    var ytPlayer;
    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            videoId: 'c1JxjGqRCOw',   //-------id改成網址中V=後面那一串就能換音樂-------//
            playerVars: { 'autoplay':0, 'loop':1, 'playlist':'c1JxjGqRCOw', 'controls':0 }  //-------playlist改成V=後面那一串-------//
        });
    }

    // --- 注音解析函數 ---
    function parseBpmf(text) {
        return text.replace(/([^\u0000-\u007F]+)(?:\[([^\]]+)\])/g, (match, char, bpmf) => {
            let tone = ''; let symbols = bpmf;
            if (['ˊ','ˇ','ˋ'].some(t => bpmf.includes(t))) { tone = bpmf.slice(-1); symbols = bpmf.slice(0, -1); }
            return `<span class="word-wrap"><span class="char">${char}</span><span class="bopomofo">${symbols.split('').join('<br>')}${tone?`<span class="tone-right">${tone}</span>`:''}</span></span>`;
        });
    }

    // --- 煙火特效 ---
    const canvas = document.getElementById('fireworks-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    class Part {
        constructor(x, y, c) {
            this.x = x; this.y = y; this.c = c;
            this.v = { x: (Math.random()-0.5)*10, y: (Math.random()-0.5)*10 };
            this.a = 1;
        }
        draw() { ctx.globalAlpha = this.a; ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2); ctx.fillStyle = this.c; ctx.fill(); }
        upd() { this.x += this.v.x; this.y += this.v.y; this.a -= 0.015; }
    }

    function anim() {
        if (!document.getElementById('result-screen').classList.contains('active')) return;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        if(Math.random()<0.1) {
            const x = Math.random()*canvas.width, y = Math.random()*canvas.height/2;
            const c = `hsl(${Math.random()*360},100%,50%)`;
            for(let i=0;i<40;i++) particles.push(new Part(x,y,c));
        }
        particles.forEach((p,i) => { if(p.a<=0) particles.splice(i,1); else { p.upd(); p.draw(); } });
        requestAnimationFrame(anim);
    }

    // --- 遊戲邏輯 ---
    let timeLeft = 60, timerId;
    let p1 = { score: 0, wrong: 0, ans: 0 }, p2 = { score: 0, wrong: 0, ans: 0 };
    const targets = [2, 4, 5, 8];

    function init() {
        document.getElementById('title-main').innerHTML = parseBpmf("乘[ㄔㄥˊ]法[ㄈㄚˇ]雙[ㄕㄨㄤ]人[ㄖㄣˊ]對[ㄉㄨㄟˋ]戰[ㄓㄢˋ]");
        document.getElementById('btn-go').innerHTML = parseBpmf("啟[ㄑㄧˇ]動[ㄉㄨㄥˋ]引[ㄧㄣˇ]擎[ㄑㄧㄥˊ]");
        document.getElementById('p1-hint').innerHTML = parseBpmf("🔴 紅[ㄏㄨㄥˊ]隊[ㄉㄨㄟˋ]鍵[ㄐㄧㄢˋ]盤[ㄆㄢˊ]") + " [ A ] [ S ] [ D ]";
        document.getElementById('p2-hint').innerHTML = parseBpmf("🔵 藍[ㄌㄢˊ]隊[ㄉㄨㄟˋ]鍵[ㄐㄧㄢˋ]盤[ㄆㄢˊ]") + " [ J ] [ K ] [ L ]";
        document.getElementById('lbl-red').innerHTML = parseBpmf("紅[ㄏㄨㄥˊ]隊[ㄉㄨㄟˋ]探[ㄊㄢˋ]險[ㄒㄧㄢˇ]家[ㄐㄧㄚ]");
        document.getElementById('lbl-blue').innerHTML = parseBpmf("藍[ㄌㄢˊ]隊[ㄉㄨㄟˋ]探[ㄊㄢˋ]險[ㄒㄧㄢˇ]家[ㄐㄧㄚ]");
        document.getElementById('btn-restart').innerHTML = parseBpmf("再[ㄗㄞˋ]次[ㄘˋ]對[ㄉㄨㄟˋ]戰[ㄓㄢˋ]");
    }

    function startGame() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (ytPlayer && ytPlayer.playVideo) { ytPlayer.setVolume(20); ytPlayer.playVideo(); }
        document.getElementById('login-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        nextQ(1); nextQ(2);
        timerId = setInterval(() => { timeLeft--; document.getElementById('timer-circle').innerText = timeLeft; if (timeLeft <= 0) endGame(); }, 1000);
    }

    function nextQ(pid) {
        const n1 = targets[Math.floor(Math.random() * targets.length)];
        const n2 = Math.floor(Math.random() * 9) + 1;
        const p = (pid === 1) ? p1 : p2;
        p.ans = n1 * n2;
        document.getElementById(`p${pid}-q`).innerText = `${n1} × ${n2}`;
        let opts = [p.ans];
        while(opts.length < 3) { let w = targets[Math.floor(Math.random() * targets.length)] * (Math.floor(Math.random() * 9) + 1); if(!opts.includes(w)) opts.push(w); }
        opts.sort(() => Math.random() - 0.5);
        opts.forEach((v, i) => { document.getElementById(`p${pid}-b${i}`).innerText = v; document.getElementById(`p${pid}-b${i}`).className = 'opt-btn'; });
    }

    function check(pid, idx) {
        const p = (pid === 1) ? p1 : p2;
        const btns = [document.getElementById(`p${pid}-b0`), document.getElementById(`p${pid}-b1`), document.getElementById(`p${pid}-b2`)];
        const val = parseInt(btns[idx].innerText);
        if(val === p.ans) {
            playSnd(true); p.score++; btns[idx].classList.add('btn-correct');
            setTimeout(() => { nextQ(pid); document.getElementById(`p${pid}-stat-top`).innerText = `成功：${p.score} | 失誤：${p.wrong}`; }, 250);
        } else {
            playSnd(false); p.wrong++; btns[idx].classList.add('btn-wrong');
            setTimeout(() => { btns[idx].classList.remove('btn-wrong'); document.getElementById(`p${pid}-stat-top`).innerText = `成功：${p.score} | 失誤：${p.wrong}`; }, 800);
        }
    }

    function endGame() {
        clearInterval(timerId);
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        let winText = "";
        if(p1.score > p2.score) winText = parseBpmf("紅[ㄏㄨㄥˊ]隊[ㄉㄨㄟˋ]勝[ㄕㄥˋ]出[ㄔㄨ]！");
        else if(p2.score > p1.score) winText = parseBpmf("藍[ㄌㄢˊ]隊[ㄉㄨㄟˋ]勝[ㄕㄥˋ]出[ㄔㄨ]！");
        else winText = parseBpmf("雙[ㄕㄨㄤ]方[ㄈㄤ]平[ㄆㄧㄥˊ]手[ㄕㄡˇ]！");
        document.getElementById('winner-banner').innerHTML = "🏆 " + winText;
        document.getElementById('res-p1-c').innerText = p1.score;
        document.getElementById('res-p1-w').innerText = p1.wrong;
        document.getElementById('res-p2-c').innerText = p2.score;
        document.getElementById('res-p2-w').innerText = p2.wrong;
        anim();
    }

    window.addEventListener('keydown', (e) => { const k = e.key.toLowerCase(); if(k === 'a') check(1,0); if(k === 's') check(1,1); if(k === 'd') check(1,2); if(k === 'j') check(2,0); if(k === 'k') check(2,1); if(k === 'l') check(2,2); });
    window.onload = init;
</script>
</body>
</html>
