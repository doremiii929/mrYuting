<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ㄅㄆㄇ注音配！</title>
    <style>
        @font-face {
            font-family: 'DFKai-SB';
            src: local('DFKai-SB'), local('BiauKai'), local('標楷體');
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'DFKai-SB', serif;
            overflow: hidden;
        }

        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.png') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        .cloud-panel {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 95%; max-width: 600px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border: 5px solid rgba(255, 255, 255, 0.6);
            z-index: 10;
        }

        .title-image { width: 80%; max-width: 350px; margin-bottom: 20px; }

        /* ✅ 強制直式選項按鈕 */
        .options-container { 
            display: flex; 
            justify-content: center; 
            gap: 50px; 
            margin-top: 20px;
        }

        .opt-btn {
            width: 140px; 
            height: 280px; 
            padding: 10px;
            border-radius: 30px;
            border: 5px solid white;
            background: rgba(255,255,255,0.9);
            cursor: pointer;
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .symbol {
            font-size: 75px; 
            line-height: 1.1;
            font-weight: bold;
            color: #2c5d63;
        }

        /* ✅ 聲調符號加大加粗 */
        .tone-mark {
            position: absolute;
            font-size: 65px; 
            font-weight: 900;
            color: #e53935; 
            right: 12px; 
            top: 50%; 
            transform: translateY(-50%);
        }

        .dot-mark {
            font-size: 65px;
            color: #e53935;
            margin-bottom: -15px;
            font-weight: 900;
        }

        .question-card { font-size: 110px; color: #333; margin: 10px 0; font-weight: bold; }
        .timer-bar { font-size: 30px; color: #ff6b6b; font-weight: bold; }
        .correct { background-color: #b2e2f2 !important; border-color: #4fc3f7 !important; }
        .wrong { background-color: #ffb7b2 !important; border-color: #ff8a80 !important; }

        #start-screen, #game-area, #result-area { display: none; }
        #start-screen { display: block; }

        .btn-start {
            background: #ffb7b2; color: #444; border: none;
            padding: 15px 45px; font-size: 28px; border-radius: 50px;
            cursor: pointer; margin-top: 20px; box-shadow: 0 5px 0 #e5a4a0;
            font-family: 'DFKai-SB';
        }
    </style>
</head>
<body>

    <audio id="snd-right" src="right.mp3"></audio>
    <audio id="snd-wrong" src="wrong.mp3"></audio>

    <div class="bg-container"></div>

    <div class="cloud-panel">
        <div id="start-screen">
            <img src="title.png" alt="ㄅㄆㄇ注音配" class="title-image">
            <br>
            <input type="text" id="player-name" placeholder="輸入名字" style="padding:15px; font-size:24px; border-radius:30px; border:2px solid #aec6cf; width:70%; text-align:center;">
            <br>
            <button class="btn-start" onclick="startGame()">開始 ➔</button>
        </div>

        <div id="game-area">
            <div class="timer-bar">⏱ <span id="time-left">60</span> 秒</div>
            <div id="q-count" style="font-size:18px; color:#666;">進度：1 / 30</div>
            <div class="question-card" id="q-text"></div>
            <div class="options-container">
                <button class="opt-btn" onclick="checkAnswer(0)" id="opt0"></button>
                <button class="opt-btn" onclick="checkAnswer(1)" id="opt1"></button>
            </div>
        </div>

        <div id="result-area">
            <h2 style="font-size:36px">完成挑戰！</h2>
            <p><span id="display-name"></span> 同學的成績：</p>
            <p style="font-size:30px">正確：<b style="color:#2c5d63" id="res-correct">0</b> | 錯誤：<b style="color:#e53935" id="res-wrong">0</b></p>
            <p>正確率：<span style="font-size:40px; color:#2c5d63" id="res-rate">0</span> %</p>
            <button class="btn-start" onclick="location.reload()">再玩一次</button>
        </div>
    </div>

    <script>
        // 🌟 這裡是老師的大題庫，您可以無限增加題目
        const hugeQuizLibrary = [
            { q: "讓", a: "ㄖㄤˋ", o: ["ㄖㄤˋ", "ㄌㄤˋ"] },
            { q: "覺", a: "ㄐㄩㄝˊ", o: ["ㄐㄩㄝˊ", "ㄐㄩㄝˇ"] },
            { q: "豐", a: "ㄈㄥ", o: ["ㄈㄥ", "ㄈㄣ"] },
            { q: "慶", a: "ㄑㄧㄥˋ", o: ["ㄑㄧㄥˋ", "ㄑㄧㄣˋ"] },
            { q: "謝", a: "ㄒㄧㄝˋ", o: ["ㄒㄧㄝˋ", "ㄒㄧㄝ"] },
            { q: "遠", a: "ㄩㄢˇ", o: ["ㄩㄢˇ", "ㄩㄢˊ"] },
            { q: "綠", a: "ㄌㄩˋ", o: ["ㄌㄩˋ", "ㄌㄧˋ"] },
            { q: "草", a: "ㄘㄠˇ", o: ["ㄘㄠˇ", "ㄔㄠˇ"] },
            { q: "裡", a: "ㄌㄧˇ", o: ["ㄌㄧˇ", "ㄌㄧˊ"] },
            { q: "跟", a: "ㄍㄣ", o: ["ㄍㄣ", "ㄍㄥ"] },
            { q: "成", a: "ㄔㄥˊ", o: ["ㄔㄥˊ", "ㄘㄥˊ"] },
            { q: "去", a: "ㄑㄩˋ", o: ["ㄑㄩˋ", "ㄑㄩ"] },
            { q: "走", a: "ㄗㄡˇ", o: ["ㄗㄡˇ", "ㄗㄡˊ"] },
            { q: "有", a: "ㄧㄡˇ", o: ["ㄧㄡˇ", "ㄧㄡˊ"] },
            { q: "好", a: "ㄏㄠˇ", o: ["ㄏㄠˇ", "ㄏㄠˊ"] },
            { q: "也", a: "ㄧㄝˇ", o: ["ㄧㄝˇ", "ㄧㄝˊ"] },
            { q: "小", a: "ㄒㄧㄠˇ", o: ["ㄒㄧㄠˇ", "ㄒㄧㄠˊ"] },
            { q: "早", a: "ㄗㄠˇ", o: ["ㄗㄠˇ", "ㄗㄠˊ"] },
            { q: "水", a: "ㄕㄨㄟˇ", o: ["ㄕㄨㄟˇ", "ㄕㄨㄟˊ"] },
            { q: "我", a: "ㄨㄛˇ", o: ["ㄨㄛˇ", "ㄨㄛˊ"] },
            { q: "生", a: "ㄕㄥ", o: ["ㄕㄥ", "ㄕㄣ"] },
            { q: "心", a: "ㄒㄧㄣ", o: ["ㄒㄧㄣ", "ㄒㄧㄥ"] },
            { q: "門", a: "ㄇㄣˊ", o: ["ㄇㄣˊ", "ㄇㄥˊ"] },
            { q: "青", a: "ㄑㄧㄥ", o: ["ㄑㄧㄥ", "ㄑㄧㄣ"] },
            { q: "在", a: "ㄗㄞˋ", o: ["ㄗㄞˋ", "ㄓㄞˋ"] },
            { q: "字", a: "ㄗˋ", o: ["ㄗˋ", "ㄓˋ"] },
            { q: "是", a: "ㄕˋ", o: ["ㄕˋ", "ㄙˋ"] },
            { q: "正", a: "ㄓㄥˋ", o: ["ㄓㄥˋ", "ㄗㄥˋ"] },
            { q: "山", a: "ㄕㄢ", o: ["ㄕㄢ", "ㄙㄢ"] },
            { q: "花", a: "ㄏㄨㄚ", o: ["ㄏㄨㄚ", "ㄏㄨㄚˋ"] },
            { q: "知", a: "ㄓ", o: ["ㄓ", "ㄗ"] },
            { q: "鄰", a: "ㄌㄧㄣˊ", o: ["ㄌㄧㄣˊ", "ㄌㄧㄥˊ"] },
            { q: "朋", a: "ㄆㄥˊ", o: ["ㄆㄥˊ", "ㄆㄣˊ"] },
            { q: "虹", a: "ㄏㄨㄥˊ", o: ["ㄏㄥˊ", "ㄏㄨㄥˊ"] },
            { q: "忙", a: "ㄇㄤˊ", o: ["ㄇㄤˊ", "ㄇㄢˊ"] },
            // 您可以在下面繼續增加題目，格式如上
        ];

        let gameQuiz = []; // 存放被選出的 30 題
        let currentIdx = 0;
        let score = { correct: 0, wrong: 0 };
        let timeLeft = 60;
        let timer;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function renderBopomofo(str) {
            const tones = ["ˊ", "ˇ", "ˋ", "˙"];
            let mainSymbols = "";
            let toneMark = "";
            for(let char of str) {
                if(tones.includes(char)) toneMark = char;
                else mainSymbols += `<div class="symbol">${char}</div>`;
            }
            let html = mainSymbols;
            if(toneMark === "˙") html = `<div class="dot-mark">˙</div>` + html;
            else if(toneMark !== "") html += `<div class="tone-mark">${toneMark}</div>`;
            return html;
        }

        function startGame() {
            const name = document.getElementById('player-name').value;
            if(!name) { alert("請輸入名字喔！"); return; }
            
            // 🌟 核心功能：先打亂題庫，然後只切出前 30 題
            let tempLib = [...hugeQuizLibrary];
            shuffle(tempLib);
            gameQuiz = tempLib.slice(0, 30); 
            
            document.getElementById('display-name').innerText = name;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            showQuestion();
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('time-left').innerText = timeLeft;
                if(timeLeft <= 0) endGame();
            }, 1000);
        }

        function showQuestion() {
            if(currentIdx >= gameQuiz.length) { endGame(); return; }
            document.getElementById('q-count').innerText = `進度：${currentIdx + 1} / ${gameQuiz.length}`;
            const data = gameQuiz[currentIdx];
            document.getElementById('q-text').innerText = data.q;
            let opts = [...data.o];
            shuffle(opts);
            document.getElementById('opt0').innerHTML = renderBopomofo(opts[0]);
            document.getElementById('opt0').dataset.val = opts[0];
            document.getElementById('opt1').innerHTML = renderBopomofo(opts[1]);
            document.getElementById('opt1').dataset.val = opts[1];
            document.getElementById('opt0').className = 'opt-btn';
            document.getElementById('opt1').className = 'opt-btn';
        }

        function checkAnswer(idx) {
            const chosen = document.getElementById('opt' + idx).dataset.val;
            const correctAns = gameQuiz[currentIdx].a;
            if(chosen === correctAns) {
                score.correct++;
                document.getElementById('snd-right').play();
                document.getElementById('opt' + idx).classList.add('correct');
            } else {
                score.wrong++;
                document.getElementById('snd-wrong').play();
                document.getElementById('opt' + idx).classList.add('wrong');
            }
            setTimeout(() => {
                currentIdx++;
                showQuestion();
            }, 500);
        }

        function endGame() {
            clearInterval(timer);
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            const total = score.correct + score.wrong;
            const rate = total === 0 ? 0 : Math.round((score.correct / total) * 100);
            document.getElementById('res-correct').innerText = score.correct;
            document.getElementById('res-wrong').innerText = score.wrong;
            document.getElementById('res-rate').innerText = rate;
        }
    </script>
</body>
</html>
