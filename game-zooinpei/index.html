<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ㄅㄆㄇ注音配！</title>
    <style>
        @font-face {
            font-family: 'DFKai-SB';
            src: local('DFKai-SB'), local('BiauKai'), local('標楷體');
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'DFKai-SB', serif;
            overflow: hidden;
        }

        /* 1. 背景圖設定 */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.png') no-repeat center center; /* 這裡換成您的背景檔名 */
            background-size: cover;
            z-index: -2;
        }

        /* 雲朵毛玻璃面板 */
        .cloud-panel {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 650px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border: 5px solid rgba(255, 255, 255, 0.6);
            z-index: 10;
        }

        /* 2. 遊戲名稱改為圖片 */
        .title-image {
            width: 80%;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .input-group { margin: 20px 0; }
        input[type="text"] {
            padding: 15px; font-size: 24px; border-radius: 30px; border: 2px solid #aec6cf;
            width: 80%; text-align: center; font-family: 'DFKai-SB';
        }

        .btn-start {
            background: #ffb7b2; color: #555; border: none;
            padding: 15px 40px; font-size: 28px; border-radius: 50px;
            cursor: pointer; margin-top: 20px; box-shadow: 0 5px 0 #e5a4a0;
            font-weight: bold;
        }

        #game-area { display: none; }
        .timer-bar { font-size: 32px; color: #ff6b6b; font-weight: bold; margin-bottom: 10px; }
        
        /* 題目字體加大 */
        .question-card { font-size: 100px; color: #4a4a4a; margin: 20px 0; font-weight: bold; }
        
        .options-container { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .opt-btn {
            width: 85%; padding: 18px; font-size: 45px; border-radius: 25px;
            border: 3px solid white; background: rgba(255,255,255,0.85);
            cursor: pointer; transition: 0.2s; font-family: 'DFKai-SB';
        }

        .correct { background-color: #b2e2f2 !important; color: #2c5d63; }
        .wrong { background-color: #ffb7b2 !important; color: #d32f2f; }

        #result-area { display: none; font-size: 26px; }
        .score-num { font-size: 45px; color: #2c5d63; font-weight: bold; }
    </style>
</head>
<body>

    <audio id="snd-right" src="right.mp3"></audio>
    <audio id="snd-wrong" src="wrong.mp3"></audio>

    <div class="bg-container"></div>

    <div class="cloud-panel" id="main-panel">
        <div id="start-screen">
            <img src="title.png" alt="ㄅㄆㄇ注音配" class="title-image">
            <div class="input-group">
                <input type="text" id="player-name" placeholder="輸入名字開始玩">
            </div>
            <button class="btn-start" onclick="startGame()">開始 ➔</button>
        </div>

        <div id="game-area">
            <div class="timer-bar">⏱ <span id="time-left">60</span> 秒</div>
            <div id="q-count" style="font-size:20px; color:#666;">題次：1 / 30</div>
            <div class="question-card" id="q-text">讓</div>
            <div class="options-container">
                <button class="opt-btn" onclick="checkAnswer(0)" id="opt0"></button>
                <button class="opt-btn" onclick="checkAnswer(1)" id="opt1"></button>
            </div>
        </div>

        <div id="result-area">
            <h2 style="font-size:40px">挑戰結果</h2>
            <p><span id="display-name"></span> 同學</p>
            <hr>
            <p>正確：<span class="score-num" id="res-correct">0</span> 題</p>
            <p>錯誤：<span style="color:#ff6b6b" id="res-wrong">0</span> 題</p>
            <p>正確率：<span class="score-num" id="res-rate">0</span> %</p>
            <button class="btn-start" onclick="location.reload()">再玩一次</button>
        </div>
    </div>

    <script>
        // 30 題隨機題庫 (根據您的生字表)
        const allQuiz = [
            { q: "讓", a: "ㄖㄤˋ", o: ["ㄖㄤˋ", "ㄌㄤˋ"] },
            { q: "覺", a: "ㄐㄩㄝˊ", o: ["ㄐㄩㄝˊ", "ㄐㄩㄝˇ"] },
            { q: "豐", a: "ㄈㄥ", o: ["ㄈㄥ", "ㄈㄣ"] },
            { q: "慶", a: "ㄑㄧㄥˋ", o: ["ㄑㄧㄥˋ", "ㄑㄧㄣˋ"] },
            { q: "謝", a: "ㄒㄧㄝˋ", o: ["ㄒㄧㄝˋ", "ㄒㄧㄝ"] },
            { q: "遠", a: "ㄩㄢˇ", o: ["ㄩㄢˇ", "ㄩㄢˊ"] },
            { q: "綠", a: "ㄌㄩˋ", o: ["ㄌㄩˋ", "ㄌㄧˋ"] },
            { q: "草", a: "ㄘㄠˇ", o: ["ㄘㄠˇ", "ㄔㄠˇ"] },
            { q: "裡", a: "ㄌㄧˇ", o: ["ㄌㄧˇ", "ㄌㄧˊ"] },
            { q: "跟", a: "ㄍㄣ", o: ["ㄍㄣ", "ㄍㄥ"] },
            { q: "成", a: "ㄔㄥˊ", o: ["ㄔㄥˊ", "ㄘㄥˊ"] },
            { q: "去", a: "ㄑㄩˋ", o: ["ㄑㄩˋ", "ㄑㄩ"] },
            { q: "走", a: "ㄗㄡˇ", o: ["ㄗㄡˇ", "ㄗㄡˊ"] },
            { q: "有", a: "ㄧㄡˇ", o: ["ㄧㄡˇ", "ㄧㄡˊ"] },
            { q: "好", a: "ㄏㄠˇ", o: ["ㄏㄠˇ", "ㄏㄠˊ"] },
            { q: "也", a: "ㄧㄝˇ", o: ["ㄧㄝˇ", "ㄧㄝˊ"] },
            { q: "小", a: "ㄒㄧㄠˇ", o: ["ㄒㄧㄠˇ", "ㄒㄧㄠˊ"] },
            { q: "早", a: "ㄗㄠˇ", o: ["ㄗㄠˇ", "ㄗㄠˊ"] },
            { q: "水", a: "ㄕㄨㄟˇ", o: ["ㄕㄨㄟˇ", "ㄕㄨㄟˊ"] },
            { q: "我", a: "ㄨㄛˇ", o: ["ㄨㄛˇ", "ㄨㄛˊ"] },
            { q: "生", a: "ㄕㄥ", o: ["ㄕㄥ", "ㄕㄣ"] },
            { q: "心", a: "ㄒㄧㄣ", o: ["ㄒㄧㄣ", "ㄒㄧㄥ"] },
            { q: "門", a: "ㄇㄣˊ", o: ["ㄇㄣˊ", "ㄇㄥˊ"] },
            { q: "青", a: "ㄑㄧㄥ", o: ["ㄑㄧㄥ", "ㄑㄧㄣ"] },
            { q: "在", a: "ㄗㄞˋ", o: ["ㄗㄞˋ", "ㄓㄞˋ"] },
            { q: "字", a: "ㄗˋ", o: ["ㄗˋ", "ㄓˋ"] },
            { q: "是", a: "ㄕˋ", o: ["ㄕˋ", "ㄙˋ"] },
            { q: "正", a: "ㄓㄥˋ", o: ["ㄓㄥˋ", "ㄗㄥˋ"] },
            { q: "山", a: "ㄕㄢ", o: ["ㄕㄢ", "ㄙㄢ"] },
            { q: "花", a: "ㄏㄨㄚ", o: ["ㄏㄨㄚ", "ㄏㄨㄚˋ"] }
        ];

        let quizData = [];
        let currentIdx = 0;
        let score = { correct: 0, wrong: 0 };
        let timeLeft = 60;
        let timer;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function startGame() {
            const name = document.getElementById('player-name').value;
            if(!name) { alert("請輸入名字喔！"); return; }
            
            quizData = [...allQuiz];
            shuffle(quizData); // 隨機題目
            
            document.getElementById('display-name').innerText = name;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            
            showQuestion();
            
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('time-left').innerText = timeLeft;
                if(timeLeft <= 0) endGame();
            }, 1000);
        }

        function showQuestion() {
            if(currentIdx >= 30) { endGame(); return; }
            
            document.getElementById('q-count').innerText = `題次：${currentIdx + 1} / 30`;
            const data = quizData[currentIdx];
            document.getElementById('q-text').innerText = data.q;
            
            let opts = [...data.o];
            shuffle(opts);
            
            document.getElementById('opt0').innerText = opts[0];
            document.getElementById('opt1').innerText = opts[1];
            document.getElementById('opt0').className = 'opt-btn';
            document.getElementById('opt1').className = 'opt-btn';
        }

        function checkAnswer(idx) {
            const chosen = document.getElementById('opt' + idx).innerText;
            const correctAns = quizData[currentIdx].a;
            
            if(chosen === correctAns) {
                score.correct++;
                document.getElementById('snd-right').play(); // 叮咚
                document.getElementById('opt' + idx).classList.add('correct');
            } else {
                score.wrong++;
                document.getElementById('snd-wrong').play(); // 逼逼
                document.getElementById('opt' + idx).classList.add('wrong');
            }

            setTimeout(() => {
                currentIdx++;
                showQuestion();
            }, 500);
        }

        function endGame() {
            clearInterval(timer);
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            
            const total = score.correct + score.wrong;
            const rate = total === 0 ? 0 : Math.round((score.correct / total) * 100);
            
            document.getElementById('res-correct').innerText = score.correct;
            document.getElementById('res-wrong').innerText = score.wrong;
            document.getElementById('res-rate').innerText = rate;
        }
    </script>
</body>
</html>
