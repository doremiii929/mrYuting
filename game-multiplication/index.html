<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九九乘法大挑戰</title>
    <style>
        @font-face {
            font-family: 'DFKai-SB';
            src: local('DFKai-SB'), local('BiauKai'), local('標楷體');
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'DFKai-SB', '標楷體', serif;
            background: linear-gradient(135deg, #e1f5fe 0%, #fce4ec 50%, #bbdefb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #game-container {
            width: 95%;
            max-width: 850px; /* 稍微加寬，確保標題不跳行 */
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 50px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 8px solid #64b5f6;
        }

        /* ---------------- 注音排版：和諧舒適比例 ---------------- */
        .word-wrap {
            display: inline-flex;
            align-items: center;
            margin: 0 4px; /* 國字間的舒適間距 */
            vertical-align: middle;
            line-height: 1;
            white-space: nowrap; /* 強制不換行 */
        }
        
        /* 標題專用：大國字、適中注音 */
        .title-style {
            display: flex;
            justify-content: center;
            flex-wrap: nowrap; /* 確保標題所有字排在同一行 */
            margin-bottom: 30px;
        }
        .title-style .char { 
            font-size: 68px; /* 標題國字：顯眼但不突兀 */
            color: #0d47a1; 
            font-weight: bold;
        }
        .title-style .bopomofo {
            font-size: 20px; /* 標題注音：與國字比例約 1:3.4，視覺最舒適 */
            margin-left: 6px;
            padding-right: 12px;
            color: #283593;
        }

        /* 通用國字與注音樣式 */
        .char { font-weight: bold; color: #333; }
        .bopomofo {
            position: relative;
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.42em; 
            line-height: 1.1;
            margin-left: 3px;
            padding-right: 10px;
            color: #444;
        }
        .tone-right {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1em;
            font-weight: bold;
        }

        /* ---------------- 介面元素 ---------------- */
        #login-screen, #game-screen, #result-screen { display: none; }
        .active { display: block !important; }

        input[type="text"] {
            width: 60%;
            padding: 15px;
            font-size: 28px;
            border: 4px solid #f06292;
            border-radius: 15px;
            text-align: center;
            margin: 20px 0 40px;
            font-family: 'DFKai-SB', '標楷體';
        }

        .btn-main {
            background-color: #f06292;
            color: white;
            padding: 18px 50px;
            font-size: 32px;
            border: none;
            border-radius: 35px;
            box-shadow: 0 6px 0 #ad1457;
            cursor: pointer;
            font-family: 'DFKai-SB', '標楷體';
            transition: all 0.2s;
        }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 #ad1457; }

        /* ---------------- 遊戲中樣式 ---------------- */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #fff;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 30px;
            font-size: 26px;
            border: 3px solid #e1f5fe;
        }
        .num-red { color: #d32f2f; font-weight: bold; font-size: 32px; }

        #question-display {
            font-size: 120px;
            margin: 40px 0;
            color: #1a237e;
            font-weight: bold;
        }

        .options-container {
            display: flex;
            justify-content: center;
            gap: 25px;
        }
        .option-btn {
            width: 180px;
            padding: 30px 0;
            font-size: 65px;
            background-color: #42a5f5;
            color: white;
            border: none;
            border-radius: 30px;
            box-shadow: 0 8px 0 #1e88e5;
            cursor: pointer;
            font-family: 'DFKai-SB', '標楷體';
        }
        .btn-correct { background-color: #66bb6a !important; box-shadow: 0 8px 0 #2e7d32 !important; }
        .btn-wrong { background-color: #ef5350 !important; box-shadow: 0 8px 0 #c62828 !important; }

        /* ---------------- 結算畫面修正 ---------------- */
        .result-box {
            background: #fff;
            padding: 40px 60px;
            border-radius: 35px;
            border: 4px solid #f8bbd0;
            margin: 10px 0 30px;
            display: inline-block;
            text-align: left;
        }
        .score-line {
            font-size: 36px;
            color: #333;
            line-height: 2.2;
            display: flex;
            align-items: center;
        }
        .score-num { color: #d32f2f; font-weight: bold; margin: 0 12px; font-size: 1.2em; }
    </style>
</head>
<body>

<div id="game-container">
    
    <div id="login-screen" class="active">
        <div id="login-title" class="title-style"></div>
        <input type="text" id="player-name" placeholder="輸入姓名" maxlength="8">
        <br>
        <button class="btn-main" onclick="startGame()" id="btn-go"></button>
    </div>

    <div id="game-screen">
        <div class="stats-bar">
            <div id="stat-timer"></div>
            <div id="stat-correct"></div>
            <div id="stat-wrong"></div>
        </div>
        <div id="question-display"></div>
        <div class="options-container">
            <button class="option-btn" onclick="checkAnswer(0)"></button>
            <button class="option-btn" onclick="checkAnswer(1)"></button>
            <button class="option-btn" onclick="checkAnswer(2)"></button>
        </div>
    </div>

    <div id="result-screen">
        <div id="end-title-large" class="title-style"></div>
        <div class="result-box">
            <div class="score-line" id="final-name"></div>
            <div class="score-line" id="line-1"></div>
            <div class="score-line" id="line-2"></div>
            <div class="score-line" id="line-3"></div>
        </div>
        <br>
        <button class="btn-main" onclick="location.reload()" id="btn-restart"></button>
    </div>
</div>

<script>
    function parseBpmf(text) {
        return text.replace(/([^\u0000-\u007F]+)(?:\[([^\]]+)\])/g, (match, char, bpmf) => {
            let tone = '';
            let mainSymbols = bpmf;
            if (['ˊ','ˇ','ˋ'].some(t => bpmf.includes(t))) {
                tone = bpmf.slice(-1);
                mainSymbols = bpmf.slice(0, -1);
            }
            let symHtml = mainSymbols.split('').join('<br>');
            let toneHtml = tone ? `<span class="tone-right">${tone}</span>` : '';
            return `<span class="word-wrap"><span class="char">${char}</span><span class="bopomofo">${symHtml}${toneHtml}</span></span>`;
        });
    }

    let timeLeft = 60, correctTotal = 0, wrongTotal = 0, currentAnswer = 0, hasErroredThisTurn = false, timerId, pName = "";

    function init() {
        document.getElementById('login-title').innerHTML = parseBpmf("九[ㄐㄧㄡˇ]九[ㄐㄧㄡˇ]乘[ㄔㄥˊ]法[ㄈㄚˇ]大[ㄉㄚˋ]挑[ㄊㄧㄠˇ]戰[ㄓㄢˋ]");
        document.getElementById('btn-go').innerHTML = parseBpmf("開[ㄎㄞ]始[ㄕˇ]遊[ㄧㄡˊ]玩[ㄨㄢˊ]");
        document.getElementById('stat-timer').innerHTML = parseBpmf("時[ㄕˊ]間[ㄐㄧㄢ]：") + '<span id="timer" class="num-red">60</span>';
        document.getElementById('stat-correct').innerHTML = parseBpmf("答[ㄉㄚˊ]對[ㄉㄨㄟˋ]：") + '<span id="correct-count" class="num-red">0</span>';
        document.getElementById('stat-wrong').innerHTML = parseBpmf("答[ㄉㄚˊ]錯[ㄘㄨㄛˋ]：") + '<span id="wrong-count" class="num-red">0</span>';
    }

    function startGame() {
        pName = document.getElementById('player-name').value.trim() || "小朋友";
        document.getElementById('login-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        nextQuestion();
        timerId = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }, 1000);
    }

    function nextQuestion() {
        hasErroredThisTurn = false;
        const n1 = Math.floor(Math.random() * 8) + 2;
        const n2 = Math.floor(Math.random() * 8) + 2;
        currentAnswer = n1 * n2;
        document.getElementById('question-display').innerText = `${n1} × ${n2}`;
        let opts = [currentAnswer];
        while(opts.length < 3) {
            let w = (Math.floor(Math.random() * 8) + 2) * (Math.floor(Math.random() * 8) + 2);
            if(!opts.includes(w)) opts.push(w);
        }
        opts.sort(() => Math.random() - 0.5);
        document.querySelectorAll('.option-btn').forEach((b, i) => {
            b.innerText = opts[i];
            b.className = 'option-btn';
            b.disabled = false;
        });
    }

    function checkAnswer(idx) {
        const btns = document.querySelectorAll('.option-btn');
        const val = parseInt(btns[idx].innerText);
        if(val === currentAnswer) {
            if(!hasErroredThisTurn) {
                correctTotal++;
                document.getElementById('correct-count').innerText = correctTotal;
            }
            btns[idx].classList.add('btn-correct');
            setTimeout(nextQuestion, 250);
        } else {
            wrongTotal++;
            hasErroredThisTurn = true;
            document.getElementById('wrong-count').innerText = wrongTotal;
            btns[idx].classList.add('btn-wrong');
            setTimeout(() => btns[idx].classList.remove('btn-wrong'), 800);
        }
    }

    function endGame() {
        clearInterval(timerId);
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        let rate = (correctTotal + wrongTotal > 0) ? Math.round((correctTotal / (correctTotal + wrongTotal)) * 100) : 0;
        
        document.getElementById('end-title-large').innerHTML = parseBpmf("挑[ㄊㄧㄠˇ]戰[ㄓㄢˋ]結[ㄐㄧㄝˊ]束[ㄕㄨˋ]");
        document.getElementById('final-name').innerHTML = `<span style="color:#ad1457; font-weight:bold;">${pName}</span>` + parseBpmf("同[ㄊㄨㄥˊ]學[ㄒㄩㄝˊ]：");
        document.getElementById('line-1').innerHTML = parseBpmf("答[ㄉㄚˊ]對[ㄉㄨㄟˋ]題[ㄊㄧˊ]數[ㄕㄨˋ]：") + `<span class="score-num">${correctTotal}</span>` + parseBpmf("題[ㄊㄧˊ]");
        document.getElementById('line-2').innerHTML = parseBpmf("答[ㄉㄚˊ]錯[ㄘㄨㄛˋ]次[ㄘˋ]數[ㄕㄨˋ]：") + `<span class="score-num">${wrongTotal}</span>` + parseBpmf("次[ㄘˋ]");
        document.getElementById('line-3').innerHTML = parseBpmf("準[ㄓㄨㄣˇ]確[ㄑㄩㄝˋ]率[ㄌㄩˋ]：") + `<span class="score-num">${rate}</span> %`;
        document.getElementById('btn-restart').innerHTML = parseBpmf("再[ㄗㄞˋ]玩[ㄨㄢˊ]一[ㄧ]次[ㄘˋ]");
    }

    window.onload = init;
</script>
</body>
</html>
